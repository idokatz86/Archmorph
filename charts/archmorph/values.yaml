# Default values for archmorph
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: archmorphacr.azurecr.io/archmorph-api
  pullPolicy: IfNotPresent
  # Default tag uses Chart.AppVersion via the deployment template.
  # Override with --set image.tag=<sha> in CI/CD.  Never use "latest" (#162).
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: archmorph.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  # Sized for GPT-4o vision workloads: 4 Uvicorn workers, ~40 threads,
  # each GPT call can consume 10-50 MB during image compression (#180)
  limits:
    cpu: "1"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
  # Custom metrics (requires KEDA or Prometheus Adapter)
  # behavior:
  #   scaleUp:
  #     stabilizationWindowSeconds: 30
  #   scaleDown:
  #     stabilizationWindowSeconds: 120

# Environment variables from ConfigMap
env:
  ENVIRONMENT: "dev"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
  RATE_LIMIT_ENABLED: "true"
  ALLOWED_ORIGINS: "http://localhost:5173"

# Secrets (referenced from external-secrets or Kubernetes secrets)
externalSecrets:
  enabled: false
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  data:
    - secretKey: AZURE_OPENAI_API_KEY
      remoteRef:
        key: openai-api-key
    - secretKey: DATABASE_URL
      remoteRef:
        key: database-url
    - secretKey: APPLICATIONINSIGHTS_CONNECTION_STRING
      remoteRef:
        key: appinsights-connection-string
    - secretKey: ARCHMORPH_ADMIN_KEY
      remoteRef:
        key: admin-key

# Health check configuration (#378)
livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30  # 150s window — allows model loading and DB migrations

nodeSelector: {}
tolerations: []
affinity: {}

# Network policy — restrict pod-to-pod traffic (#105 — I-010)
networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx
