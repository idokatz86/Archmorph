# Pre-commit hooks for Archmorph (#282)
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  # ── Python linting & formatting (backend) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── General file hygiene ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^(frontend/node_modules/|playwright-report/)
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # ── Secret scanning (#377) ──
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)(
            \.lock$|
            \.svg$|
            node_modules/|
            \.venv/|
            playwright-report/
          )

  # ── Frontend linting ──
  - repo: local
    hooks:
      - id: block-terraform-secrets
        name: Block sensitive Terraform files (tfstate / tfvars)
        language: system
        # Matches terraform.tfvars (exact) and any *.tfstate / *.tfstate.* file.
        # The .example / .prod / .staging variants are safe to commit;
        # the unqualified terraform.tfvars and any real state file are not.
        entry: bash -c 'echo "⛔ Blocked: Do not commit terraform.tfvars or *.tfstate files. Store secrets outside the repo." && exit 1'
        files: '^(.*\/)?terraform\.tfvars$|\.tfstate(\..*)?$'
        pass_filenames: false
        stages: [commit]
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npx eslint --fix'
        language: system
        files: ^frontend/src/.*\.(js|jsx|ts|tsx)$
        pass_filenames: true
      - id: prettier
        name: prettier
        entry: bash -c 'cd frontend && npx prettier --write'
        language: system
        files: ^frontend/src/.*\.(js|jsx|ts|tsx|css|json)$
        pass_filenames: true
