[pytest]
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --tb=short --cov=. --cov-report=term-missing --cov-report=html:htmlcov --cov-config=.coveragerc
markers =
    fast: Tests under 100ms (select with '-m fast')
    slow: Tests over 1s
    integration: Tests requiring external services
    contract: API contract validation tests
    coverage: Tests targeting coverage gaps
    chaos: Chaos engineering / resilience tests
    security: Security-related tests
