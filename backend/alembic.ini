# Archmorph Alembic configuration (Issue #168)
[alembic]
script_location = alembic
# Default uses DATABASE_URL env var (set in env.py).
# Fallback for local dev with docker-compose: PostgreSQL.
# Override: DATABASE_URL=postgresql://user:pass@localhost:5432/archmorph
sqlalchemy.url = postgresql://archmorph:archmorph_dev@localhost:5432/archmorph

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
