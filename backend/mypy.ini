# Archmorph backend — mypy static type checking configuration (#280)
[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
check_untyped_defs = True
disallow_untyped_defs = False
disallow_incomplete_defs = True
no_implicit_optional = True
strict_equality = True
show_error_codes = True
show_column_numbers = True
pretty = True

# Ignore missing imports for third-party packages not yet typed
[mypy-redis.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-cachetools.*]
ignore_missing_imports = True

[mypy-tenacity.*]
ignore_missing_imports = True

[mypy-alembic.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-slowapi.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-docx.*]
ignore_missing_imports = True

[mypy-pptx.*]
ignore_missing_imports = True

[mypy-lxml.*]
ignore_missing_imports = True

[mypy-fcntl.*]
ignore_missing_imports = True
