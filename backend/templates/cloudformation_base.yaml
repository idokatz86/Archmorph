AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Archmorph — Base CloudFormation template for cloud migration.
  Project: {{PROJECT_NAME}} | Environment: {{ENVIRONMENT}} | Region: {{REGION}}

Parameters:
  ProjectName:
    Type: String
    Default: '{{PROJECT_NAME}}'
    Description: Project name used for tagging and naming resources

  Environment:
    Type: String
    Default: '{{ENVIRONMENT}}'
    AllowedValues: [dev, staging, production]
    Description: Deployment environment

  VpcCidr:
    Type: String
    Default: '10.0.0.0/16'
    Description: CIDR block for the VPC

Resources:
  # ─── Networking ─────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-vpc'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: Archmorph

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.1.0/24'
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-public'

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: '10.0.2.0/24'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-private'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-igw'

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnetId:
    Description: Public subnet ID
    Value: !Ref PublicSubnet

  PrivateSubnetId:
    Description: Private subnet ID
    Value: !Ref PrivateSubnet

# NOTE: This is a base template. Upload a diagram for full IaC generation.
