# ─────────────────────────────────────────────────────────────
# Archmorph — Local Development Stack (#176)
# Usage: docker compose up --build
# ─────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── PostgreSQL (Issue #283) ──
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: archmorph
      POSTGRES_PASSWORD: archmorph_dev
      POSTGRES_DB: archmorph
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archmorph"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Issue #283) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: dev
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      RATE_LIMIT_ENABLED: "false"
      DATABASE_URL: "postgresql://archmorph:archmorph_dev@postgres:5432/archmorph"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      # Hot-reload: mount source but exclude venv / __pycache__
      - ./backend:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "http://localhost:8000/api"
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
    command: ["sh", "-c", "npm ci && npm run dev -- --host 0.0.0.0"]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  frontend_nm:
