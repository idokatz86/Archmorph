name: Manual Rollback

on:
  workflow_dispatch:
    inputs:
      revision_name:
        description: 'Revision name to roll back to (leave empty for previous revision)'
        required: false
        type: string
      traffic_percentage:
        description: 'Traffic percentage to route to the target revision (default: 100)'
        required: false
        default: '100'
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  API_URL: ${{ secrets.API_URL }}
  ARCHMORPH_API_KEY: ${{ secrets.ARCHMORPH_API_KEY }}
  ADMIN_KEY: ${{ secrets.ADMIN_KEY }}

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Determine rollback revision
        id: revision
        env:
          INPUT_REVISION: ${{ github.event.inputs.revision_name }}
        run: |
          if [ -n "$INPUT_REVISION" ]; then
            echo "target=$INPUT_REVISION" >> $GITHUB_OUTPUT
            echo "Using specified revision: $INPUT_REVISION"
          else
            # Get the list of revisions, pick the second one (previous active)
            REVISIONS=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?properties.active].name" -o tsv)
            
            CURRENT=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[?properties.trafficWeight > \`0\`].name" -o tsv | head -1)

            PREVIOUS=$(echo "$REVISIONS" | grep -v "^$CURRENT$" | head -1)
            
            if [ -z "$PREVIOUS" ]; then
              echo "::error::No previous revision found for rollback"
              exit 1
            fi
            echo "target=$PREVIOUS" >> $GITHUB_OUTPUT
            echo "Rolling back to previous revision: $PREVIOUS (current: $CURRENT)"
          fi

      - name: Activate rollback revision
        run: |
          az containerapp revision activate \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision ${{ steps.revision.outputs.target }}

      - name: Shift traffic to rollback revision
        env:
          INPUT_TRAFFIC: ${{ github.event.inputs.traffic_percentage || '100' }}
          ROLLBACK_TARGET: ${{ steps.revision.outputs.target }}
        run: |
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision-weight "$ROLLBACK_TARGET=$INPUT_TRAFFIC"
          echo "Shifted ${INPUT_TRAFFIC}% traffic to $ROLLBACK_TARGET"

      - name: Verify rollback health
        run: |
          echo "Waiting 30s for revision to stabilize..."
          sleep 30
          BASE="${API_URL%/}"
          BASE="${BASE%/api}"
          HEALTH_API_KEY="${ARCHMORPH_API_KEY:-${ADMIN_KEY:-}}"
          _CURL_ARGS=(-sS --max-time 30)
          if [ -n "$HEALTH_API_KEY" ]; then
            _CURL_ARGS+=(-H "X-API-Key: ${HEALTH_API_KEY}")
          fi
          if ! HTTP_CODE=$(curl "${_CURL_ARGS[@]}" -o health.json -w "%{http_code}" "${BASE}/api/health"); then
            echo "::error::Health check curl failed after rollback"
            cat health.json || true
            exit 1
          fi
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Health check returned HTTP ${HTTP_CODE} after rollback"
            cat health.json || true
            exit 1
          fi
          HEALTH=$(jq -r '.status' health.json)
          VERSION=$(jq -r '.version' health.json)
          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::Health check failed after rollback: $HEALTH"
            cat health.json || true
            exit 1
          fi
          echo "Rollback successful — version: $VERSION, status: $HEALTH"
