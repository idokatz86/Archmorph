name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'LICENSE'
      - '.gitignore'

# OIDC for Azure deploy; no security-events needed (security.yml handles SARIF)
permissions:
  id-token: write
  security-events: write
  contents: read

env:
  API_URL: ${{ secrets.API_URL }}
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================
  # BACKEND TESTS (3.12 only — production version)
  # ============================================
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies and lint
        run: |
          uv pip install --system ruff
          uv pip install --system -r requirements.txt
          ruff check .

      - name: Run tests with coverage
        run: |
          python -m pytest --tb=short -q -n auto --dist loadfile \
            --cov=. --cov-report=term-missing --cov-config=.coveragerc \
            --cov-context=test --cov-fail-under=63
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Export OpenAPI schema
        run: python export_openapi.py > openapi.json

      - name: Check OpenAPI contract snapshot
        run: python check_openapi_contract.py openapi.json

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v7
        with:
          name: openapi-schema
          path: backend/openapi.json
          retention-days: 30

      - name: Generate Backend SBOM
        run: |
          uv pip install --system cyclonedx-bom
          cyclonedx-py requirements -i requirements.txt -o ${{ github.workspace }}/backend-sbom.json

      - name: Grype scan (Python)
        id: grype-python
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ github.workspace }}/backend-sbom.json
          output-format: sarif
          fail-build: "false"

      - name: Upload Python Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-sbom
          path: |
            backend-sbom.json
            ${{ steps.grype-python.outputs.sarif }}

  # ============================================
  # FRONTEND BUILD & TEST (npm audit in security.yml)
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Run frontend linter
        run: npm run lint

      - name: Run frontend tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

      - name: Generate npm SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file ${{ github.workspace }}/frontend-sbom.json --output-format JSON --spec-version 1.5

      - name: Grype scan (npm)
        id: grype-npm
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ github.workspace }}/frontend-sbom.json
          output-format: sarif
          fail-build: "false"

      - name: Upload npm Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-sbom
          path: |
            frontend-sbom.json
            ${{ steps.grype-npm.outputs.sarif }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ============================================
  # GENERATED OPENAPI CLIENT DRIFT
  # ============================================
  openapi-client-drift:
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download backend OpenAPI schema
        uses: actions/download-artifact@v8
        with:
          name: openapi-schema
          path: .

      - name: Normalize downloaded OpenAPI schema location
        run: |
          if [ -f openapi.json ]; then
            mv openapi.json backend/openapi.json
          fi
          test -f backend/openapi.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-fund --no-audit

      - name: Check generated OpenAPI client artifacts
        working-directory: frontend
        run: npm run check:api-drift

      - name: Upload generated OpenAPI client artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openapi-client-artifacts
          path: |
            frontend/src/generated/api-types.d.ts
            frontend/src/generated/api-paths.js
          retention-days: 30

  # ============================================
  # SARIF UPLOAD (isolated so rate-limits don't block builds)
  # ============================================
  upload-sarif:
    needs: [backend-tests, frontend-build, openapi-client-drift]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && (needs.backend-tests.result == 'success' || needs.frontend-build.result == 'success')
    continue-on-error: true
    steps:
      - name: Download backend SARIF
        uses: actions/download-artifact@v8
        with:
          name: backend-sbom
          path: backend-sarif
        continue-on-error: true

      - name: Download frontend SARIF
        uses: actions/download-artifact@v8
        with:
          name: frontend-sbom
          path: frontend-sarif
        continue-on-error: true

      - name: Upload Python Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('backend-sarif/**/*.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: backend-sarif
          category: grype-python

      - name: Upload npm Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('frontend-sarif/**/*.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: frontend-sarif
          category: grype-npm

  # ============================================
  # BACKEND DEPLOY (Blue-Green)
  # ============================================
  deploy-backend:
    needs: [backend-tests, frontend-build, openapi-client-drift]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      CONTAINER_APP_ENV: ${{ secrets.CONTAINER_APP_ENV }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push to ACR
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Trivy container security gate
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: library
          scanners: vuln  # Skip secret/misconfig scanning, focus on dependency CVEs

      - name: Provision metrics storage
        run: |
          STORAGE_NAME="archmorphmetrics"
          if ! az storage account show --name "$STORAGE_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            echo "Creating storage account..."
            az storage account create \
              --name "$STORAGE_NAME" \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --location westeurope \
              --sku Standard_LRS \
              --min-tls-version TLS1_2 \
              --https-only true \
              --allow-blob-public-access false \
              --allow-shared-key-access true \
              --only-show-errors
          else
            echo "Storage account $STORAGE_NAME already exists, skipping creation."
          fi
          STORAGE_CONN=$(az storage account show-connection-string \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query connectionString -o tsv)
          echo "STORAGE_CONN=$STORAGE_CONN" >> "$GITHUB_ENV"
          az storage container create \
            --name metrics \
            --account-name "$STORAGE_NAME" \
            --auth-mode login \
            --only-show-errors || true

      - name: Enable multiple revisions
        run: |
          az containerapp revision set-mode \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --mode multiple

      - name: Deploy green revision
        id: green
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              admin-key="${{ env.ADMIN_KEY }}" \
              storage-connection="${{ env.STORAGE_CONN }}" \
            2>/dev/null || true

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }} \
            --set-env-vars \
              ARCHMORPH_ADMIN_KEY=secretref:admin-key \
              AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT="gpt-4.1" \
              AZURE_OPENAI_FALLBACK_DEPLOYMENT="gpt-4o" \
              AZURE_OPENAI_API_VERSION="2025-04-01-preview" \
              ACS_CONNECTION_STRING="${{ secrets.ACS_CONNECTION_STRING }}" \
              ACS_SENDER_EMAIL="${{ secrets.ACS_SENDER_EMAIL }}" \
            --revision-suffix "sha-${SHORT_SHA}" \
            --no-wait

          echo "Waiting for green revision to provision..."
          sleep 45

          GREEN_REV=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'sha-${SHORT_SHA}')].name" -o tsv | head -1)

          echo "green_revision=$GREEN_REV" >> $GITHUB_OUTPUT
          echo "Green revision: $GREEN_REV"

      - name: Smoke test green revision
        run: |
          GREEN_FQDN=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "${{ steps.green.outputs.green_revision }}" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")

          TEST_URL="${GREEN_FQDN:+https://$GREEN_FQDN}"
          # API_URL includes /api suffix; for raw FQDNs we need /api/health,
          # for API_URL fallback we need /health
          if [ -n "$GREEN_FQDN" ]; then
            HEALTH_PATH="/api/health"
          else
            TEST_URL="${{ env.API_URL }}"
            HEALTH_PATH="/health"
          fi

          echo "Running smoke tests against: $TEST_URL$HEALTH_PATH"
          HEALTH_RETRIES=3 HEALTH_RETRY_SECONDS=15 ./scripts/health_gate.sh "$TEST_URL$HEALTH_PATH"
          VERSION=$(curl -s --max-time 30 "$TEST_URL$HEALTH_PATH" | jq -r '.version' 2>/dev/null || echo 'unknown')
          echo "Green revision version: $VERSION — all smoke tests passed"

      - name: Shift traffic to green (100%)
        run: |
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision-weight "${{ steps.green.outputs.green_revision }}=100"

      - name: Deactivate old revisions (keep blue for rollback)
        run: |
          OLD_REVS=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active && name != '${{ steps.green.outputs.green_revision }}'].name" -o tsv)

          KEEP_BLUE=$(echo "$OLD_REVS" | head -1)
          DEACTIVATE=$(echo "$OLD_REVS" | tail -n +2)

          [ -n "$KEEP_BLUE" ] && echo "Keeping blue revision for rollback: $KEEP_BLUE"

          for rev in $DEACTIVATE; do
            echo "Deactivating old revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$rev" || true
          done

      - name: Verify production deployment
        run: |
          sleep 10
          HEALTH_RETRIES=3 HEALTH_RETRY_SECONDS=10 ./scripts/health_gate.sh "${{ env.API_URL }}/health"
          HEALTH=$(curl -s --max-time 30 ${{ env.API_URL }}/health | jq -r '.status')
          VERSION=$(curl -s --max-time 30 ${{ env.API_URL }}/health | jq -r '.version')
          echo "Deployed version: $VERSION — status: $HEALTH (blue-green complete)"

  # ============================================
  # FRONTEND DEPLOY (Azure Static Web Apps)
  # ============================================
  deploy-frontend:
    needs: [backend-tests, frontend-build, openapi-client-drift]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true

  # ============================================
  # POST-DEPLOY SMOKE
  # ============================================
  post-deploy-smoke:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run deployed app smoke checks
        run: bash scripts/deployment_smoke.sh
        env:
          API_URL: ${{ env.API_URL }}
          FRONTEND_URL: ${{ env.FRONTEND_URL }}
