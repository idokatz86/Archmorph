name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC for Azure deploy; no security-events needed (security.yml handles SARIF)
permissions:
  id-token: write
  security-events: write
  contents: read

env:
  API_URL: ${{ secrets.API_URL }}
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  azure-skills-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check azure-skills upstream pin and collisions
        run: python scripts/check_azure_skills_upstream.py --check-telemetry-env
        env:
          AZURE_MCP_COLLECT_TELEMETRY: "false"

  mappings-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Lint mapping freshness
        run: python scripts/lint_mappings_freshness.py

  container-image-pins:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Guard Docker base image pins
        run: python3 scripts/lint_docker_base_images.py

  # ============================================
  # BACKEND TESTS (3.12 only — production version)
  # ============================================
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies and lint
        run: |
          uv pip install --system ruff
          uv pip install --system -r requirements.txt
          ruff check .
          python ../scripts/lint_pytest_no_reruns.py
          python scripts/lint_fastapi_query_body_tests.py

      - name: Run tests with coverage
        run: |
          python -m pytest --tb=short -q -n auto --dist loadfile \
            --cov=. --cov-report=term-missing --cov-config=.coveragerc \
            --cov-context=test --cov-fail-under=63
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Risk-based module coverage floors
        run: |
          mkdir -p coverage-risk

          run_risk_coverage_floor() {
            local module="$1"
            local tests="$2"
            local floor="$3"
            local safe_module="${module//./_}"
            echo "Running risk-based coverage floor for ${module} with ${tests} (floor=${floor}%)"
            python -m pytest --tb=short -q "$tests" \
              --cov="$module" --cov-report=term-missing \
              --cov-report=xml:"coverage-risk/${safe_module}.xml" \
              --cov-config=.coveragerc --cov-context=test \
              --cov-fail-under="$floor"
          }

          run_risk_coverage_floor "diagram_export" "tests/test_diagram_export.py" "70"
          run_risk_coverage_floor "export_capabilities" "tests/test_export_capabilities.py" "70"
          run_risk_coverage_floor "iac_generator" "tests/test_iac_generator.py" "70"
          run_risk_coverage_floor "session_store" "tests/test_session_store.py" "50"
          run_risk_coverage_floor "job_queue" "tests/test_job_queue.py" "70"
          run_risk_coverage_floor "services.azure_pricing" "tests/test_pricing_blob.py" "35"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Upload risk-based coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-risk-report
          path: backend/coverage-risk/
          retention-days: 30

      - name: Export OpenAPI schema
        run: python export_openapi.py > openapi.json

      - name: Capture base OpenAPI snapshot (PR only)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch origin "${{ github.base_ref }}" --depth=1
          git show "origin/${{ github.base_ref }}:backend/openapi.snapshot.json" > /tmp/base-openapi.snapshot.json

      - name: Check OpenAPI contract snapshot
        run: python check_openapi_contract.py openapi.json
        env:
          ARCHMORPH_OPENAPI_BASE_SNAPSHOT: /tmp/base-openapi.snapshot.json

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v7
        with:
          name: openapi-schema
          path: backend/openapi.json
          retention-days: 30

      - name: Generate Backend SBOM
        run: |
          uv pip install --system cyclonedx-bom
          cyclonedx-py requirements -i requirements.txt -o ${{ github.workspace }}/backend-sbom.json

      - name: Grype scan (Python)
        id: grype-python
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ github.workspace }}/backend-sbom.json
          output-format: sarif
          fail-build: "false"

      - name: Upload Python Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-sbom
          path: |
            backend-sbom.json
            ${{ steps.grype-python.outputs.sarif }}

  # ============================================
  # ALEMBIC MIGRATION SMOKE
  # ============================================
  alembic-migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: archmorph
          POSTGRES_PASSWORD: archmorph_dev
          POSTGRES_DB: archmorph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archmorph -d archmorph"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://archmorph:archmorph_dev@127.0.0.1:5432/archmorph
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install backend dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Alembic migration cycle
        run: |
          python -m alembic heads
          python -m alembic upgrade head --sql > /tmp/archmorph-alembic-upgrade.sql
          test -s /tmp/archmorph-alembic-upgrade.sql
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

  # ============================================
  # GENERATED IAC VALIDATION
  # ============================================
  iac-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Install Bicep CLI
        run: az bicep install

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p "$RUNNER_TEMP/terraform-plugin-cache"
          echo "TF_PLUGIN_CACHE_DIR=$RUNNER_TEMP/terraform-plugin-cache" >> "$GITHUB_ENV"

      - name: Install backend dependencies
        run: uv pip install --system -r requirements.txt

      - name: Validate generated Terraform and Bicep artifacts
        run: python -m pytest -q tests/test_iac_output_validation.py
        env:
          ARCHMORPH_RUN_IAC_VALIDATE_TOOLS: "1"
          ARCHMORPH_ENABLE_TERRAFORM_CLI_VALIDATION: "1"

  # ============================================
  # CHECKED-IN TERRAFORM VALIDATION
  # ============================================
  terraform-config-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p "$RUNNER_TEMP/terraform-plugin-cache"
          echo "TF_PLUGIN_CACHE_DIR=$RUNNER_TEMP/terraform-plugin-cache" >> "$GITHUB_ENV"

      - name: Check Terraform formatting
        run: find . -path './.terraform' -prune -o -name '*.tf' -print0 | xargs -0 terraform fmt -check

      - name: Validate checked-in Terraform roots without remote backends
        run: |
          for dir in . staging dr observability; do
            echo "::group::terraform validate infra/$dir"
            terraform -chdir="$dir" init -backend=false -input=false -lockfile=readonly
            terraform -chdir="$dir" validate -no-color
            echo "::endgroup::"
          done

  # ============================================
  # TERRAFORM POLICY-AS-CODE
  # ============================================
  terraform-policy-as-code:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          python -m pip install checkov

      - name: Run Archmorph Terraform policy checks
        run: |
          checkov \
            --quiet \
            --framework terraform \
            --directory infra \
            --external-checks-dir infra/policies/checkov \
            --check CKV_ARCHMORPH_1,CKV_ARCHMORPH_2,CKV_ARCHMORPH_3,CKV_ARCHMORPH_4,CKV_ARCHMORPH_5

  # ============================================
  # CLI FULL-SPINE ARTIFACT CONTRACT
  # ============================================
  cli-full-spine-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install CLI test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -e cli pytest

      - name: Run CLI full-spine artifact contract tests
        run: python -m pytest -q cli/tests/test_archmorph_cli_run.py cli/tests/test_archmorph_cli_http_smoke.py

      - name: Run container-backed CLI full-spine smoke
        run: bash scripts/cli_full_spine_container_smoke.sh
        env:
          DOCKER_BUILDKIT: "1"

  # ============================================
  # FRONTEND BUILD & TEST (npm audit in security.yml)
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LHCI_PORT: "4173"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Run frontend linter
        run: npm run lint

      - name: Guard Vite environment exposure
        run: python3 ../scripts/lint_vite_env_guard.py

      - name: Run frontend tests with Live coverage gate
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

      - name: Bundle size budget
        run: python3 ../scripts/perf_budget.py bundle --dist dist --budget perf/bundle-budget.json

      - name: Lighthouse CI budget
        run: |
          python3 -m http.server "$LHCI_PORT" -d dist >/tmp/archmorph-lighthouse.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          SERVER_READY=0
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${LHCI_PORT}/" >/dev/null; then
              SERVER_READY=1
              break
            fi
            sleep 1
          done
          if [ "$SERVER_READY" -ne 1 ]; then
            cat /tmp/archmorph-lighthouse.log
            exit 1
          fi
          npx --yes @lhci/cli@0.15.1 autorun --config=./lighthouserc.json

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-lighthouse-report
          path: frontend/.lighthouseci
          if-no-files-found: ignore

      - name: Generate npm SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file ${{ github.workspace }}/frontend-sbom.json --output-format JSON --spec-version 1.5

      - name: Grype scan (npm)
        id: grype-npm
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ github.workspace }}/frontend-sbom.json
          output-format: sarif
          fail-build: "false"

      - name: Upload npm Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-sbom
          path: |
            frontend-sbom.json
            ${{ steps.grype-npm.outputs.sarif }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: frontend/coverage
          if-no-files-found: error

  # ============================================
  # GENERATED OPENAPI CLIENT DRIFT
  # ============================================
  openapi-client-drift:
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download backend OpenAPI schema
        uses: actions/download-artifact@v8
        with:
          name: openapi-schema
          path: .

      - name: Normalize downloaded OpenAPI schema location
        run: |
          if [ -f openapi.json ]; then
            mv openapi.json backend/openapi.json
          fi
          test -f backend/openapi.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-fund --no-audit

      - name: Check generated OpenAPI client artifacts
        working-directory: frontend
        run: npm run check:api-drift

      - name: Upload generated OpenAPI client artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openapi-client-artifacts
          path: |
            frontend/src/generated/api-types.d.ts
            frontend/src/generated/api-paths.js
          retention-days: 30

  # ============================================
  # SARIF UPLOAD (isolated so rate-limits don't block builds)
  # ============================================
  upload-sarif:
    needs: [backend-tests, frontend-build, openapi-client-drift, iac-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && (needs.backend-tests.result == 'success' || needs.frontend-build.result == 'success')
    continue-on-error: true
    steps:
      - name: Download backend SARIF
        uses: actions/download-artifact@v8
        with:
          name: backend-sbom
          path: backend-sarif
        continue-on-error: true

      - name: Download frontend SARIF
        uses: actions/download-artifact@v8
        with:
          name: frontend-sbom
          path: frontend-sarif
        continue-on-error: true

      - name: Upload Python Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('backend-sarif/**/*.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: backend-sarif
          category: grype-python

      - name: Upload npm Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('frontend-sarif/**/*.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: frontend-sarif
          category: grype-npm

  # ============================================
  # BACKEND DEPLOY (Blue-Green)
  # ============================================
  deploy-backend:
    needs: [backend-tests, frontend-build, openapi-client-drift, iac-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      CONTAINER_APP_ENV: ${{ secrets.CONTAINER_APP_ENV }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
      ARCHMORPH_API_KEY: ${{ secrets.ARCHMORPH_API_KEY || secrets.API_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      TRUSTED_FRONT_DOOR_FDID: ${{ secrets.TRUSTED_FRONT_DOOR_FDID }}
      TRUSTED_FRONT_DOOR_HOSTS: ${{ secrets.TRUSTED_FRONT_DOOR_HOSTS }}
      REQUIRE_FRONT_DOOR_ORIGIN_LOCK: ${{ vars.REQUIRE_FRONT_DOOR_ORIGIN_LOCK || 'false' }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"
          terraform_wrapper: false

      - name: Validate backend deploy secret inputs
        run: |
          missing=0
          for name in \
            AZURE_SUBSCRIPTION_ID \
            AZURE_TENANT_ID \
            AZURE_CLIENT_ID \
            AZURE_RESOURCE_GROUP \
            ACR_NAME \
            ACR_LOGIN_SERVER \
            CONTAINER_APP_NAME \
            ADMIN_KEY \
            ARCHMORPH_API_KEY \
            JWT_SECRET; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Required backend deploy input ${name} is not set"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push to ACR
        id: build_backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Capture immutable image reference
        run: |
          if [ -z "${{ steps.build_backend.outputs.digest }}" ]; then
            echo "::error::docker/build-push-action did not return an image digest"
            exit 1
          fi
          IMAGE_REF="${{ env.ACR_LOGIN_SERVER }}/archmorph-api@${{ steps.build_backend.outputs.digest }}"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "Using immutable image reference: $IMAGE_REF"

      - name: Trivy container security gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: library
          scanners: vuln  # Skip secret/misconfig scanning, focus on dependency CVEs

      - name: Validate Terraform-managed metrics storage
        run: |
          CONTAINER_APP_JSON=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o json)
          ENV_JSON=$(echo "$CONTAINER_APP_JSON" | jq -c '.properties.template.containers[0].env // []')

          STORAGE_ACCOUNT_URL=$(echo "$ENV_JSON" | jq -r '.[] | select(.name == "AZURE_STORAGE_ACCOUNT_URL") | .value // ""')
          if [ -z "$STORAGE_ACCOUNT_URL" ]; then
            echo "::error::Container App is missing AZURE_STORAGE_ACCOUNT_URL. Configure it via Terraform-managed env vars before CI deploy."
            exit 1
          fi
          STORAGE_NAME=$(echo "$STORAGE_ACCOUNT_URL" | sed -E 's#^https://([^.]+)\.blob\.core\.windows\.net/?$#\1#')
          if [ -z "$STORAGE_NAME" ] || [ "$STORAGE_NAME" = "$STORAGE_ACCOUNT_URL" ]; then
            echo "::error::Unable to parse storage account name from AZURE_STORAGE_ACCOUNT_URL=$STORAGE_ACCOUNT_URL"
            exit 1
          fi
          echo "STORAGE_NAME=$STORAGE_NAME" >> "$GITHUB_ENV"
          echo "STORAGE_ACCOUNT_URL=$STORAGE_ACCOUNT_URL" >> "$GITHUB_ENV"

          if ! az storage account show --name "$STORAGE_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            echo "::error::Storage account $STORAGE_NAME was not found in resource group ${{ env.AZURE_RESOURCE_GROUP }}"
            exit 1
          fi

          ALLOW_SHARED_KEY=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query allowSharedKeyAccess -o tsv | tr '[:upper:]' '[:lower:]')
          if [ "$ALLOW_SHARED_KEY" != "false" ]; then
            echo "::error::Storage account $STORAGE_NAME must have shared-key access disabled"
            exit 1
          fi

          PUBLIC_NETWORK_ACCESS=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query publicNetworkAccess -o tsv)
          if [ "$PUBLIC_NETWORK_ACCESS" != "Disabled" ]; then
            if [ "$STORAGE_NAME" = "archmorphmetrics" ]; then
              echo "::error::Terraform storage migration pending: Container App still references legacy storage account $STORAGE_NAME with public network access ${PUBLIC_NETWORK_ACCESS}."
              echo "::notice::Run the Terraform Production workflow (workflow_dispatch) with apply=true to migrate production to Terraform-managed storage/private endpoints."
              echo "::notice::If Terraform Production fails during init, grant AZURE_CLIENT_ID Blob data-plane access on the tfstate storage account/container and rerun."
            else
              echo "::error::Production storage account $STORAGE_NAME must have public network access disabled to match Terraform configuration"
            fi
            exit 1
          fi

          STORAGE_ID=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query id -o tsv)
          if [ -z "$STORAGE_ID" ]; then
            echo "::error::Unable to resolve storage account resource ID for $STORAGE_NAME"
            exit 1
          fi
          echo "STORAGE_ID=$STORAGE_ID" >> "$GITHUB_ENV"

          METRICS_CONTAINER_ID="$STORAGE_ID/blobServices/default/containers/metrics"
          METRICS_CONTAINER_ERROR=$(mktemp)
          set +e
          METRICS_CONTAINER_RESOURCE=$(az rest \
            --method get \
            --uri "https://management.azure.com${METRICS_CONTAINER_ID}?api-version=2023-01-01" \
            --query id -o tsv 2>"$METRICS_CONTAINER_ERROR")
          METRICS_CONTAINER_STATUS=$?
          set -e
          if [ "$METRICS_CONTAINER_STATUS" -ne 0 ]; then
            echo "::error::Unable to query Terraform-managed metrics container through Azure Resource Manager"
            sed 's/^/az rest: /' "$METRICS_CONTAINER_ERROR" >&2
            rm -f "$METRICS_CONTAINER_ERROR"
            exit 1
          fi
          rm -f "$METRICS_CONTAINER_ERROR"
          if [ "$METRICS_CONTAINER_RESOURCE" != "$METRICS_CONTAINER_ID" ]; then
            echo "::error::Expected Terraform-managed metrics container to exist in storage account $STORAGE_NAME"
            exit 1
          fi

          CONTAINER_APP_CLIENT_ID=$(echo "$ENV_JSON" | jq -r '.[] | select(.name == "AZURE_CLIENT_ID") | .value // ""')
          if [ -n "$CONTAINER_APP_CLIENT_ID" ]; then
            CONTAINER_APP_PRINCIPAL_ID=$(echo "$CONTAINER_APP_JSON" \
              | jq -r --arg client_id "$CONTAINER_APP_CLIENT_ID" '.identity.userAssignedIdentities // {} | to_entries[] | select(.value.clientId == $client_id) | .value.principalId' \
              | head -1)
            if [ -z "$CONTAINER_APP_PRINCIPAL_ID" ]; then
              echo "::error::Container App user-assigned identity principal is not available for AZURE_CLIENT_ID=$CONTAINER_APP_CLIENT_ID"
              exit 1
            fi
            echo "Using Container App user-assigned managed identity for storage validation"
          else
            CONTAINER_APP_PRINCIPAL_ID=$(echo "$CONTAINER_APP_JSON" | jq -r '.identity.principalId // ""')
            if [ -z "$CONTAINER_APP_PRINCIPAL_ID" ]; then
              echo "::error::Container App is missing AZURE_CLIENT_ID and has no system-assigned identity principal for storage access"
              exit 1
            fi
            echo "::notice::Container App AZURE_CLIENT_ID is not set; using the system-assigned managed identity for storage validation until Terraform user-assigned identity migration is applied."
          fi
          echo "CONTAINER_APP_PRINCIPAL_ID=$CONTAINER_APP_PRINCIPAL_ID" >> "$GITHUB_ENV"

          EXISTING_ASSIGNMENT=$(az role assignment list \
            --assignee "$CONTAINER_APP_PRINCIPAL_ID" \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ID" \
            --query "[0].id" -o tsv)
          if [ -z "$EXISTING_ASSIGNMENT" ]; then
            echo "::error::Container App identity is missing Storage Blob Data Contributor on $STORAGE_NAME"
            exit 1
          fi
          echo "Container App identity has Storage Blob Data Contributor on $STORAGE_NAME"
          echo "STORAGE_ROLE_ASSIGNMENT_ID=$EXISTING_ASSIGNMENT" >> "$GITHUB_ENV"

      - name: Enable multiple revisions
        run: |
          az containerapp revision set-mode \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --mode multiple

      - name: Deploy green revision
        id: green
        run: |
          FRONT_DOOR_PROFILE_NAME=""
          TRUSTED_FRONT_DOOR_FDID="${TRUSTED_FRONT_DOOR_FDID:-}"
          TRUSTED_FRONT_DOOR_HOSTS="${TRUSTED_FRONT_DOOR_HOSTS:-}"
          REQUIRE_FRONT_DOOR_ORIGIN_LOCK=$(echo "${REQUIRE_FRONT_DOOR_ORIGIN_LOCK:-false}" | tr '[:upper:]' '[:lower:]')
          if terraform -chdir=infra init -input=false -lockfile=readonly >/tmp/terraform-init-front-door.log 2>&1; then
            TERRAFORM_FRONT_DOOR_FDID=$(terraform -chdir=infra output -raw front_door_profile_resource_guid 2>/dev/null || echo "")
            TERRAFORM_FRONT_DOOR_HOSTS=$(terraform -chdir=infra output -raw front_door_api_hostname 2>/dev/null || echo "")
            if [ -n "$TERRAFORM_FRONT_DOOR_FDID" ]; then
              TRUSTED_FRONT_DOOR_FDID="$TERRAFORM_FRONT_DOOR_FDID"
            fi
            if [ -n "$TERRAFORM_FRONT_DOOR_HOSTS" ]; then
              TRUSTED_FRONT_DOOR_HOSTS="$TERRAFORM_FRONT_DOOR_HOSTS"
            fi
          else
            echo "::warning::Unable to initialize Terraform remote state for Front Door outputs"
            tail -n 40 /tmp/terraform-init-front-door.log || true
          fi

          EXISTING_ENV_JSON=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env" -o json 2>/dev/null || echo "[]")
          if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] || [ -z "$TRUSTED_FRONT_DOOR_HOSTS" ]; then
            EXISTING_FRONT_DOOR_FDID=$(echo "$EXISTING_ENV_JSON" | jq -r '.[] | select(.name == "TRUSTED_FRONT_DOOR_FDID") | .value // ""' | head -1)
            EXISTING_FRONT_DOOR_HOSTS=$(echo "$EXISTING_ENV_JSON" | jq -r '.[] | select(.name == "TRUSTED_FRONT_DOOR_HOSTS") | .value // ""' | head -1)
            if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] && [ -n "$EXISTING_FRONT_DOOR_FDID" ]; then
              TRUSTED_FRONT_DOOR_FDID="$EXISTING_FRONT_DOOR_FDID"
            fi
            if [ -z "$TRUSTED_FRONT_DOOR_HOSTS" ] && [ -n "$EXISTING_FRONT_DOOR_HOSTS" ]; then
              TRUSTED_FRONT_DOOR_HOSTS="$EXISTING_FRONT_DOOR_HOSTS"
            fi
          fi
          CONTAINER_APP_FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")

          if ! az extension show --name front-door &>/dev/null; then
            az extension add --name front-door --upgrade --only-show-errors \
              || echo "::warning::Unable to install Azure CLI front-door extension; falling back to generic ARM discovery"
          fi

          resource_group_from_id() {
            echo "$1" | sed -E 's#^/subscriptions/[^/]+/resourceGroups/([^/]+)/.*#\1#'
          }

          show_afd_resource() {
            local resource_id="$1"
            az resource show --ids "$resource_id" --api-version 2024-02-01 -o json 2>/dev/null \
              || az resource show --ids "$resource_id" -o json 2>/dev/null \
              || echo "{}"
          }

          front_door_profile_fdid() {
            local profile_json="$1"
            local profile_id="$2"
            local profile_name="$3"
            local profile_group="$4"
            local fdid
            fdid=$(echo "$profile_json" | jq -r '.frontDoorId // .resourceGuid // .properties.frontDoorId // .properties.resourceGuid // ""')
            if [ -z "$fdid" ] && [ -n "$profile_id" ]; then
              fdid=$(show_afd_resource "$profile_id" | jq -r '.frontDoorId // .resourceGuid // .properties.frontDoorId // .properties.resourceGuid // ""')
            fi
            if [ -z "$fdid" ] && [ -n "$profile_name" ] && [ -n "$profile_group" ]; then
              fdid=$(az afd profile show \
                --profile-name "$profile_name" \
                --resource-group "$profile_group" \
                -o json 2>/dev/null \
                | jq -r '.frontDoorId // .resourceGuid // .properties.frontDoorId // .properties.resourceGuid // ""')
            fi
            echo "$fdid"
          }

          front_door_profile_targets_container() {
            local profile_name="$1"
            local profile_group="$2"
            local container_host="$3"
            local origin_groups_json
            if [ -z "$profile_name" ] || [ -z "$profile_group" ] || [ -z "$container_host" ]; then
              return 1
            fi

            origin_groups_json=$(az afd origin-group list \
              --profile-name "$profile_name" \
              --resource-group "$profile_group" \
              -o json 2>/dev/null || echo "[]")
            while IFS= read -r origin_group_name; do
              if [ -z "$origin_group_name" ]; then
                continue
              fi
              if az afd origin list \
                --profile-name "$profile_name" \
                --resource-group "$profile_group" \
                --origin-group-name "$origin_group_name" \
                -o json 2>/dev/null \
                | jq -e --arg container_host "$(echo "$container_host" | tr '[:upper:]' '[:lower:]')" 'any(.[]; [(.hostName // .properties.hostName // ""), (.originHostHeader // .properties.originHostHeader // "")] | map(ascii_downcase) | any(. == $container_host))' >/dev/null; then
                return 0
              fi
            done < <(echo "$origin_groups_json" | jq -r '.[] | .name // empty')
            return 1
          }

          front_door_endpoint_host() {
            local profile_name="$1"
            local profile_group="$2"
            local prefer_api_endpoint="$3"
            local endpoints_json
            local fallback_host=""
            endpoints_json=$(az afd endpoint list \
              --profile-name "$profile_name" \
              --resource-group "$profile_group" \
              -o json 2>/dev/null || echo "[]")
            while IFS= read -r endpoint_json; do
              local endpoint_host
              local endpoint_label
              endpoint_host=$(echo "$endpoint_json" | jq -r '.hostName // .properties.hostName // ""')
              if [ -z "$endpoint_host" ]; then
                continue
              fi
              endpoint_label=$(echo "$endpoint_json" | jq -r '((.name // "") + " " + (.hostName // .properties.hostName // "")) | ascii_downcase')
              if [ -z "$fallback_host" ]; then
                fallback_host="$endpoint_host"
              fi
              if [ "$prefer_api_endpoint" = "true" ] && [[ "$endpoint_label" == *api* ]]; then
                echo "$endpoint_host"
                return 0
              fi
            done < <(echo "$endpoints_json" | jq -c '.[]')
            echo "$fallback_host"
          }

          resolve_front_door_contract_from_afd_cli() {
            local prefer_api_endpoint="$1"
            while IFS= read -r candidate_profile_json; do
              if [ -z "$candidate_profile_json" ]; then
                continue
              fi
              candidate_profile_id=$(echo "$candidate_profile_json" | jq -r '.id // ""')
              candidate_profile_name=$(echo "$candidate_profile_json" | jq -r '.name // ""')
              candidate_profile_group=$(resource_group_from_id "$candidate_profile_id")
              if ! front_door_profile_targets_container "$candidate_profile_name" "$candidate_profile_group" "$CONTAINER_APP_FQDN"; then
                continue
              fi
              candidate_fdid=$(front_door_profile_fdid "$candidate_profile_json" "$candidate_profile_id" "$candidate_profile_name" "$candidate_profile_group")
              candidate_host=$(front_door_endpoint_host "$candidate_profile_name" "$candidate_profile_group" "$prefer_api_endpoint")
              if [ -n "$candidate_host" ] && [ -n "$candidate_fdid" ]; then
                echo "${candidate_profile_name}|${candidate_fdid}|${candidate_host}"
                return 0
              fi
            done < <(echo "$AFD_PROFILES_JSON" | jq -c '.[]')
            return 1
          }

          if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] || [ -z "$TRUSTED_FRONT_DOOR_HOSTS" ]; then
            AFD_PROFILES_JSON=$(az afd profile list -o json 2>/dev/null || echo "[]")
            if [ "$(echo "$AFD_PROFILES_JSON" | jq 'length')" -eq 0 ]; then
              echo "::warning::Azure CLI AFD profile list returned no profiles; trying generic ARM profile list"
              AFD_PROFILES_JSON=$(az resource list \
                --resource-type Microsoft.Cdn/profiles \
                -o json 2>/dev/null || echo "[]")
            fi
            AFD_CONTRACT=$(resolve_front_door_contract_from_afd_cli true || true)
            if [ -z "$AFD_CONTRACT" ]; then
              AFD_CONTRACT=$(resolve_front_door_contract_from_afd_cli false || true)
            fi
            if [ -n "$AFD_CONTRACT" ]; then
              IFS='|' read -r FRONT_DOOR_PROFILE_NAME TRUSTED_FRONT_DOOR_FDID TRUSTED_FRONT_DOOR_HOSTS <<< "$AFD_CONTRACT"
            else
              if [ "$(echo "$AFD_PROFILES_JSON" | jq 'length')" -gt 0 ]; then
                echo "::warning::Unable to resolve Front Door contract from AFD CLI profiles; trying generic ARM discovery"
              fi
            fi
          fi

          FRONT_DOOR_PROFILES_JSON=$(az resource list \
            --resource-type Microsoft.Cdn/profiles \
            -o json 2>/dev/null || echo "[]")
          FRONT_DOOR_ENDPOINTS_JSON=$(az resource list \
            --resource-type Microsoft.Cdn/profiles/afdEndpoints \
            -o json 2>/dev/null || echo "[]")
          FRONT_DOOR_ORIGINS_JSON=$(az resource list \
            --resource-type Microsoft.Cdn/profiles/originGroups/origins \
            -o json 2>/dev/null || echo "[]")

          if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] || [ -z "$TRUSTED_FRONT_DOOR_HOSTS" ]; then
            while IFS= read -r candidate_profile_json; do
              if [ -z "$candidate_profile_json" ]; then
                continue
              fi
              candidate_profile_id=$(echo "$candidate_profile_json" | jq -r '.id // ""')
              candidate_profile_name=$(echo "$candidate_profile_json" | jq -r '.name // ""')
              candidate_fdid=$(echo "$candidate_profile_json" | jq -r '.properties.frontDoorId // .properties.resourceGuid // ""')
              origin_matches_container=$(echo "$FRONT_DOOR_ORIGINS_JSON" | jq -r --arg profile_id "$candidate_profile_id" --arg container_host "$CONTAINER_APP_FQDN" 'any(.[]; ((.id // "") | startswith($profile_id + "/")) and ((.properties.hostName // "") == $container_host))')
              if [ "$origin_matches_container" != "true" ]; then
                continue
              fi
              candidate_host=$(echo "$FRONT_DOOR_ENDPOINTS_JSON" | jq -r --arg profile_id "$candidate_profile_id" '[.[] | select((.id // "") | startswith($profile_id + "/")) | select(((.name // "") | ascii_downcase | contains("api")) or (((.properties.hostName // "") | ascii_downcase) | contains("api"))) | .properties.hostName][0] // ""')
              if [ -n "$candidate_host" ] && [ -n "$candidate_fdid" ]; then
                FRONT_DOOR_PROFILE_NAME="$candidate_profile_name"
                TRUSTED_FRONT_DOOR_FDID="$candidate_fdid"
                TRUSTED_FRONT_DOOR_HOSTS="$candidate_host"
                break
              fi
            done < <(echo "$FRONT_DOOR_PROFILES_JSON" | jq -c '.[]')
          fi

          if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] || [ -z "$TRUSTED_FRONT_DOOR_HOSTS" ]; then
            while IFS= read -r candidate_profile_json; do
              if [ -z "$candidate_profile_json" ]; then
                continue
              fi
              candidate_profile_id=$(echo "$candidate_profile_json" | jq -r '.id // ""')
              candidate_profile_name=$(echo "$candidate_profile_json" | jq -r '.name // ""')
              candidate_fdid=$(echo "$candidate_profile_json" | jq -r '.properties.frontDoorId // .properties.resourceGuid // ""')
              origin_matches_container=$(echo "$FRONT_DOOR_ORIGINS_JSON" | jq -r --arg profile_id "$candidate_profile_id" --arg container_host "$CONTAINER_APP_FQDN" 'any(.[]; ((.id // "") | startswith($profile_id + "/")) and ((.properties.hostName // "") == $container_host))')
              if [ "$origin_matches_container" != "true" ]; then
                continue
              fi
              candidate_host=$(echo "$FRONT_DOOR_ENDPOINTS_JSON" | jq -r --arg profile_id "$candidate_profile_id" '[.[] | select((.id // "") | startswith($profile_id + "/")) | .properties.hostName][0] // ""')
              if [ -n "$candidate_host" ] && [ -n "$candidate_fdid" ]; then
                FRONT_DOOR_PROFILE_NAME="$candidate_profile_name"
                TRUSTED_FRONT_DOOR_FDID="$candidate_fdid"
                TRUSTED_FRONT_DOOR_HOSTS="$candidate_host"
                break
              fi
            done < <(echo "$FRONT_DOOR_PROFILES_JSON" | jq -c '.[]')
          fi

          if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] || [ -z "$TRUSTED_FRONT_DOOR_HOSTS" ]; then
            if [ "$REQUIRE_FRONT_DOOR_ORIGIN_LOCK" = "true" ]; then
              echo "::error::Unable to resolve Front Door FDID/hostname for required origin-lock contract"
              exit 1
            fi
            echo "::warning::Unable to resolve Front Door FDID/hostname; deploying without origin-lock because REQUIRE_FRONT_DOOR_ORIGIN_LOCK is not true"
            TRUSTED_FRONT_DOOR_FDID=""
            TRUSTED_FRONT_DOOR_HOSTS=""
          fi

          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              admin-key="${{ env.ADMIN_KEY }}" \
              api-key="${{ env.ARCHMORPH_API_KEY }}" \
              jwt-secret="${{ env.JWT_SECRET }}"

          SET_ENV_VARS=(
            ARCHMORPH_ADMIN_KEY=secretref:admin-key
            ARCHMORPH_API_KEY=secretref:api-key
            JWT_SECRET=secretref:jwt-secret
            AZURE_STORAGE_ACCOUNT_URL="$STORAGE_ACCOUNT_URL"
            AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}"
            AZURE_OPENAI_DEPLOYMENT="gpt-4.1"
            AZURE_OPENAI_FALLBACK_DEPLOYMENT="gpt-4o"
            AZURE_OPENAI_API_VERSION="2025-04-01-preview"
            ACS_SENDER_EMAIL="${{ secrets.ACS_SENDER_EMAIL }}"
            WEB_CONCURRENCY="1"
            TRUSTED_FRONT_DOOR_FDID="$TRUSTED_FRONT_DOOR_FDID"
            TRUSTED_FRONT_DOOR_HOSTS="$TRUSTED_FRONT_DOOR_HOSTS"
          )

          if [ -n "${{ secrets.ACS_CONNECTION_STRING }}" ]; then
            az containerapp secret set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --secrets acs-connection-string="${{ secrets.ACS_CONNECTION_STRING }}"
            SET_ENV_VARS+=(ACS_CONNECTION_STRING=secretref:acs-connection-string)
          fi

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          REVISION_SUFFIX="sha-${SHORT_SHA}-run-${{ github.run_attempt }}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${IMAGE_REF}" \
            --set-env-vars "${SET_ENV_VARS[@]}" \
            --revision-suffix "$REVISION_SUFFIX" \
            --no-wait

          echo "Waiting for green revision to provision..."
          sleep 45

          GREEN_REV=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, '$REVISION_SUFFIX')].name" -o tsv | head -1)

          echo "green_revision=$GREEN_REV" >> $GITHUB_OUTPUT
          echo "Green revision: $GREEN_REV"

      - name: Wait for green revision readiness
        run: |
          GREEN_REV="${{ steps.green.outputs.green_revision }}"
          if [ -z "$GREEN_REV" ]; then
            echo "::error::Green revision name was not produced by deploy step"
            exit 1
          fi

          for attempt in $(seq 1 24); do
            if ! REVISION_JSON=$(az containerapp revision show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$GREEN_REV" \
              -o json 2>revision-show.err); then
              echo "Green revision readiness attempt ${attempt}: revision show failed"
              cat revision-show.err || true
              sleep 10
              continue
            fi
            PROVISIONING_STATE=$(echo "$REVISION_JSON" | jq -r '.properties.provisioningState // "unknown"')
            RUNNING_STATE=$(echo "$REVISION_JSON" | jq -r '.properties.runningState // "unknown"')
            HEALTH_STATE=$(echo "$REVISION_JSON" | jq -r '.properties.healthState // "unknown"')
            REPLICAS=$(echo "$REVISION_JSON" | jq -r '.properties.replicas // "unknown"')
            echo "Green revision readiness attempt ${attempt}: provisioning=${PROVISIONING_STATE} running=${RUNNING_STATE} health=${HEALTH_STATE} replicas=${REPLICAS}"

            if { [ "$PROVISIONING_STATE" = "Succeeded" ] || [ "$PROVISIONING_STATE" = "Provisioned" ]; } && { [ "$RUNNING_STATE" = "Running" ] || [ "$RUNNING_STATE" = "unknown" ]; }; then
              echo "Green revision is provisioned and running enough for smoke tests"
              exit 0
            fi

            sleep 10
          done

          echo "::error::Green revision did not become ready before smoke tests"
          az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "$GREEN_REV" \
            --query '{name:name,provisioningState:properties.provisioningState,runningState:properties.runningState,healthState:properties.healthState,replicas:properties.replicas,createdTime:properties.createdTime}' \
            -o json || true
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "$GREEN_REV" \
            --tail 100 || true
          exit 1

      - name: Preflight green revision auth and storage contract
        run: |
          GREEN_REV="${{ steps.green.outputs.green_revision }}"
          if [ -z "$GREEN_REV" ]; then
            echo "::error::Green revision name was not produced by deploy step"
            exit 1
          fi

          ENV_JSON=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "$GREEN_REV" \
            --query "properties.template.containers[0].env" -o json)

          for name in ARCHMORPH_ADMIN_KEY ARCHMORPH_API_KEY AZURE_STORAGE_ACCOUNT_URL; do
            if ! echo "$ENV_JSON" | jq -e --arg name "$name" 'any(.[]; .name == $name)' >/dev/null; then
              echo "::error::Green revision is missing required env var ${name}"
              exit 1
            fi
          done

          ADMIN_SECRET_REF=$(echo "$ENV_JSON" | jq -r '.[] | select(.name == "ARCHMORPH_ADMIN_KEY") | .secretRef // ""')
          if [ "$ADMIN_SECRET_REF" != "admin-key" ]; then
            echo "::error::ARCHMORPH_ADMIN_KEY must reference admin-key secret"
            exit 1
          fi

          API_SECRET_REF=$(echo "$ENV_JSON" | jq -r '.[] | select(.name == "ARCHMORPH_API_KEY") | .secretRef // ""')
          if [ "$API_SECRET_REF" != "api-key" ]; then
            echo "::error::ARCHMORPH_API_KEY must reference api-key secret"
            exit 1
          fi

          for name in ARCHMORPH_ADMIN_KEY ARCHMORPH_API_KEY; do
            SECRET_REF=$(echo "$ENV_JSON" | jq -r --arg name "$name" '.[] | select(.name == $name) | .secretRef // ""')
            if [ -z "$SECRET_REF" ]; then
              echo "::error::${name} must reference a Container App secret"
              exit 1
            fi
          done

          STORAGE_URL_VALUE=$(echo "$ENV_JSON" | jq -r '.[] | select(.name == "AZURE_STORAGE_ACCOUNT_URL") | .value // ""')
          if [ "$STORAGE_URL_VALUE" != "$STORAGE_ACCOUNT_URL" ]; then
            echo "::error::AZURE_STORAGE_ACCOUNT_URL mismatch. Expected $STORAGE_ACCOUNT_URL, got $STORAGE_URL_VALUE"
            exit 1
          fi

          if [ -z "${CONTAINER_APP_PRINCIPAL_ID:-}" ] || [ -z "${STORAGE_ROLE_ASSIGNMENT_ID:-}" ]; then
            echo "::error::Container App identity or blob role assignment proof is missing"
            exit 1
          fi

      - name: Smoke test green revision
        run: |
          GREEN_FQDN=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "${{ steps.green.outputs.green_revision }}" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")

          TEST_URL="${GREEN_FQDN:+https://$GREEN_FQDN}"
          # API_URL includes /api suffix; for raw FQDNs we need /api/health,
          # for API_URL fallback we need /health
          if [ -n "$GREEN_FQDN" ]; then
            HEALTH_PATH="/api/health"
          else
            TEST_URL="${{ env.API_URL }}"
            HEALTH_PATH="/health"
          fi

          TRUSTED_FRONT_DOOR_FDID=""
          TRUSTED_FRONT_DOOR_HOST=""
          TRUSTED_ORIGIN_CURL_ARGS=()
          REQUIRE_FRONT_DOOR_ORIGIN_LOCK=$(echo "${REQUIRE_FRONT_DOOR_ORIGIN_LOCK:-false}" | tr '[:upper:]' '[:lower:]')
          if [ -n "$GREEN_FQDN" ]; then
            TRUSTED_FRONT_DOOR_FDID=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.template.containers[0].env[?name=='TRUSTED_FRONT_DOOR_FDID'].value | [0]" \
              -o tsv 2>/dev/null || echo "")
            TRUSTED_FRONT_DOOR_HOST=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.template.containers[0].env[?name=='TRUSTED_FRONT_DOOR_HOSTS'].value | [0]" \
              -o tsv 2>/dev/null || echo "")
            TRUSTED_FRONT_DOOR_HOST="${TRUSTED_FRONT_DOOR_HOST%%,*}"
            if [ -z "$TRUSTED_FRONT_DOOR_FDID" ] || [ -z "$TRUSTED_FRONT_DOOR_HOST" ]; then
              if [ "$REQUIRE_FRONT_DOOR_ORIGIN_LOCK" = "true" ]; then
                echo "::error::Expected Front Door origin-lock settings are missing from the Container App"
                exit 1
              fi
              echo "::warning::Front Door origin-lock settings are missing; direct-origin rejection check will be skipped"
            else
              TRUSTED_ORIGIN_CURL_ARGS=(-H "X-Azure-FDID: $TRUSTED_FRONT_DOOR_FDID" -H "Host: $TRUSTED_FRONT_DOOR_HOST")
            fi
          fi

          dump_green_revision_diagnostics() {
            local reason="$1"
            echo "::group::Green revision diagnostics (${reason})"
            az containerapp revision show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "${{ steps.green.outputs.green_revision }}" \
              --query '{name:name,provisioningState:properties.provisioningState,runningState:properties.runningState,healthState:properties.healthState,replicas:properties.replicas,createdTime:properties.createdTime,fqdn:properties.fqdn}' \
              -o json || true
            az containerapp logs show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "${{ steps.green.outputs.green_revision }}" \
              --tail 100 || true
            echo "::endgroup::"
          }

          curl_health() {
            local url="$1"
            local curl_args=(-sS --max-time 30)
            if [ ${#TRUSTED_ORIGIN_CURL_ARGS[@]} -gt 0 ]; then
              curl_args+=("${TRUSTED_ORIGIN_CURL_ARGS[@]}")
            fi
            if [ -n "${ARCHMORPH_API_KEY:-}" ]; then
              curl_args+=(-H "X-API-Key: $ARCHMORPH_API_KEY")
            fi
            if [ -z "${ARCHMORPH_API_KEY:-}" ] && [ -n "${ADMIN_KEY:-}" ]; then
              curl_args+=(-H "X-API-Key: $ADMIN_KEY")
            fi
            curl "${curl_args[@]}" "$url"
          }

          HEALTHZ_URL="${TEST_URL%/api}/healthz"
          echo "Checking green revision liveness: $HEALTHZ_URL"
          HEALTHZ_MAX_ATTEMPTS=12
          for attempt in $(seq 1 "$HEALTHZ_MAX_ATTEMPTS"); do
            : > healthz-response.json
            if ! HEALTHZ_CODE=$(curl -sS -o healthz-response.json -w "%{http_code}" \
              --max-time 20 "$HEALTHZ_URL"); then
              HEALTHZ_CODE="000"
            fi
            if [ "$HEALTHZ_CODE" = "200" ]; then
              break
            fi
            echo "Green revision /healthz attempt ${attempt} returned HTTP ${HEALTHZ_CODE}"
            [ -s healthz-response.json ] && head -c 2000 healthz-response.json || true
            if [ "$attempt" -lt "$HEALTHZ_MAX_ATTEMPTS" ]; then
              sleep 15
            fi
          done
          if [ "$HEALTHZ_CODE" != "200" ]; then
            echo "::error::Green revision /healthz returned HTTP ${HEALTHZ_CODE}"
            [ -s healthz-response.json ] && head -c 2000 healthz-response.json || true
            dump_green_revision_diagnostics "healthz-${HEALTHZ_CODE}"
            exit 1
          fi

          if [ -n "$GREEN_FQDN" ] && [ ${#TRUSTED_ORIGIN_CURL_ARGS[@]} -gt 0 ]; then
            : > direct-origin-response.json
            if ! DIRECT_ORIGIN_CODE=$(curl -sS -o direct-origin-response.json -w "%{http_code}" \
              --max-time 20 "$TEST_URL/openapi.json"); then
              DIRECT_ORIGIN_CODE="000"
            fi
            if [ "$DIRECT_ORIGIN_CODE" != "403" ]; then
              echo "::error::Direct green revision origin-lock check returned HTTP ${DIRECT_ORIGIN_CODE}"
              [ -s direct-origin-response.json ] && head -c 2000 direct-origin-response.json || true
              dump_green_revision_diagnostics "origin-lock-${DIRECT_ORIGIN_CODE}"
              exit 1
            fi
            echo "Direct green revision access correctly blocked (${DIRECT_ORIGIN_CODE})"
          elif [ -n "$GREEN_FQDN" ]; then
            echo "::warning::Skipping direct green revision origin-lock rejection check because no trusted Front Door contract is configured"
          fi

          echo "Running smoke tests against: $TEST_URL$HEALTH_PATH"
          BODY=$(curl_health "$TEST_URL$HEALTH_PATH" || true)
          CATALOG_STALE=$(echo "$BODY" | jq -r '.service_catalog_refresh.stale // false' 2>/dev/null || echo false)
          echo "Initial green revision service_catalog_refresh.stale=$CATALOG_STALE"

          if [ -n "$GREEN_FQDN" ]; then
            STORAGE_PREFLIGHT_URL="$TEST_URL/api/service-updates/storage-preflight"
            REFRESH_URL="$TEST_URL/api/service-updates/run-now"
          else
            STORAGE_PREFLIGHT_URL="$TEST_URL/service-updates/storage-preflight"
            REFRESH_URL="$TEST_URL/service-updates/run-now"
          fi

          echo "Validating green revision managed-identity blob read/write/list path: $STORAGE_PREFLIGHT_URL"
          for attempt in 1 2 3 4 5 6; do
            if ! HTTP_CODE=$(curl -sS -o storage-preflight-response.json -w "%{http_code}" \
              --max-time 60 \
              "${TRUSTED_ORIGIN_CURL_ARGS[@]}" \
              -X POST "$STORAGE_PREFLIGHT_URL" \
              -H "X-API-Key: $ARCHMORPH_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}'); then
              HTTP_CODE="${HTTP_CODE:-000}"
            fi

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Green revision managed-identity blob preflight OK on attempt ${attempt}"
              break
            fi

            echo "::warning::Green revision managed-identity blob preflight attempt ${attempt} returned HTTP ${HTTP_CODE}"
            if [ -s storage-preflight-response.json ]; then
              jq -c '{detail: (.detail // .)}' storage-preflight-response.json 2>/dev/null \
                || head -c 2000 storage-preflight-response.json
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep $((attempt * 15))
            else
              echo "::error::Green revision managed-identity blob preflight failed after 6 attempts"
              exit 1
            fi
          done

          echo "Validating green revision refresh auth and managed-identity blob path: $REFRESH_URL"
          for attempt in 1 2; do
            if ! HTTP_CODE=$(curl -sS -o refresh-response.json -w "%{http_code}" \
              --max-time 300 \
              "${TRUSTED_ORIGIN_CURL_ARGS[@]}" \
              -X POST "$REFRESH_URL" \
              -H "X-API-Key: $ARCHMORPH_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{}'); then
              HTTP_CODE="${HTTP_CODE:-000}"
            fi

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Green revision service catalog refresh OK on attempt ${attempt}"
              break
            fi

            echo "::warning::Green revision refresh attempt ${attempt} returned HTTP ${HTTP_CODE}"
            if [ -s refresh-response.json ]; then
              jq -c '{status: (.status // .detail // "unknown"), errors: (.errors // {})}' refresh-response.json 2>/dev/null \
                || head -c 2000 refresh-response.json
            fi
            if [ "$attempt" -lt 2 ]; then
              sleep $((attempt * 15))
            else
              echo "::error::Green revision service catalog refresh failed after 2 attempts"
              exit 1
            fi
          done

          for attempt in 1 2 3; do
            HEALTH_BODY=$(curl_health "$TEST_URL$HEALTH_PATH" || true)
            if HEALTH_BODY="$HEALTH_BODY" HEALTH_RETRIES=1 HEALTH_RETRY_SECONDS=0 ./scripts/health_gate.sh; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 15
          done
          VERSION=$(curl_health "$TEST_URL$HEALTH_PATH" | jq -r '.version' 2>/dev/null || echo 'unknown')
          echo "Green revision version: $VERSION — all smoke tests passed"

      - name: Shift traffic to green (100%)
        run: |
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision-weight "${{ steps.green.outputs.green_revision }}=100"

      - name: Deactivate old revisions (keep blue for rollback)
        run: |
          OLD_REVS=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active && name != '${{ steps.green.outputs.green_revision }}'].name" -o tsv)

          KEEP_BLUE=$(echo "$OLD_REVS" | head -1)
          DEACTIVATE=$(echo "$OLD_REVS" | tail -n +2)

          [ -n "$KEEP_BLUE" ] && echo "Keeping blue revision for rollback: $KEEP_BLUE"

          for rev in $DEACTIVATE; do
            echo "Deactivating old revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$rev" || true
          done

      - name: Verify production deployment
        run: |
          sleep 10
          HEALTH_RETRIES=3 HEALTH_RETRY_SECONDS=10 HEALTH_API_KEY="$ARCHMORPH_API_KEY" ./scripts/health_gate.sh "${{ env.API_URL }}/health"
          HEALTH_BODY=$(curl -s --max-time 30 -H "X-API-Key: $ARCHMORPH_API_KEY" "${{ env.API_URL }}/health")
          HEALTH=$(printf '%s' "$HEALTH_BODY" | jq -r '.status')
          VERSION=$(printf '%s' "$HEALTH_BODY" | jq -r '.version')
          echo "Deployed version: $VERSION — status: $HEALTH (blue-green complete)"

  # ============================================
  # FRONTEND DEPLOY (Azure Static Web Apps)
  # ============================================
  deploy-frontend:
    needs: [backend-tests, frontend-build, openapi-client-drift, iac-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true

  # ============================================
  # POST-DEPLOY SMOKE
  # ============================================
  post-deploy-smoke:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Run deployed app smoke checks
        run: bash scripts/deployment_smoke.sh
        env:
          API_URL: ${{ env.API_URL }}
          FRONTEND_URL: ${{ env.FRONTEND_URL }}
          HEALTH_API_KEY: ${{ secrets.ARCHMORPH_API_KEY || secrets.API_KEY }}
