name: CI/CD

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

# OIDC permissions for Azure login
permissions:
  id-token: write
  contents: read
  security-events: write

# All sensitive values come from GitHub Secrets - no hardcoded credentials
# NOTE: Deployment secrets are scoped to deployment jobs only (least privilege)
env:
  API_URL: ${{ secrets.API_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================
  # BACKEND LINT & SECURITY (Parallel)
  # ============================================
  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: |
          echo "::group::Installing linters"
          SECONDS=0
          pip install ruff bandit pip-audit
          echo "::endgroup::"
          echo "::notice::Linter install took ${SECONDS}s"

      - name: Ruff lint
        run: |
          SECONDS=0
          ruff check .
          echo "::notice::Ruff lint took ${SECONDS}s"

      - name: Bandit security scan
        run: |
          SECONDS=0
          # B101 (assert_used) is skipped globally since tests use assertions
          # B311 (random) is skipped — all random usage is for simulation/demo data, not security
          # All other findings use inline # nosec comments for precise documentation
          bandit -r . -x ./tests,./.venv --skip B101,B311
          echo "::notice::Bandit scan took ${SECONDS}s"

      - name: pip-audit
        run: |
          echo "::group::pip-audit"
          SECONDS=0
          pip install -r requirements.txt
          pip-audit --ignore-vuln GHSA-wj6h-64fc-37mp
          echo "::endgroup::"
          echo "::notice::pip-audit took ${SECONDS}s"
        # Note: GHSA-wj6h-64fc-37mp (ecdsa timing attack) has no fix available yet

  # ============================================
  # SAST - Semgrep Security Analysis (#45)
  # ============================================
  sast-semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST Scan
        run: semgrep scan --config p/security-audit --config p/owasp-top-ten --config p/python --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ============================================
  # SECRET DETECTION - Gitleaks (#45)
  # ============================================
  secret-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # SBOM Generation - CycloneDX (#42)
  # ============================================
  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Python SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements -i requirements.txt -o ../sbom-python.json

      - name: Generate npm SBOM
        working-directory: frontend
        run: |
          npm ci
          npx @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-python.json
            sbom-frontend.json
          retention-days: 90

  # ============================================
  # BACKEND TESTS (Parallel with pytest-xdist) (#36)
  # ============================================
  backend-tests:
    needs: backend-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          echo "::group::Installing dependencies"
          SECONDS=0
          pip install -r requirements.txt
          echo "::endgroup::"
          echo "::notice::Dependency install took ${SECONDS}s"

      - name: Run tests with coverage
        run: |
          SECONDS=0
          python -m pytest --tb=short -q --cov=. --cov-report=term-missing --cov-config=.coveragerc
          echo "::notice::Tests (Python ${{ matrix.python-version }}) took ${SECONDS}s"
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

  # ============================================
  # FRONTEND BUILD & TEST
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Run frontend tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

  # ============================================
  # STAGING DEPLOY (Issue #147 — Pre-production validation)
  # ============================================
  deploy-staging:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/staging'
    environment: staging
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.STAGING_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.STAGING_CONTAINER_APP_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push staging image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:staging-${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:staging-${{ github.sha }} \
            --set-env-vars ENVIRONMENT=staging \
            --revision-suffix "stg-${SHORT_SHA}"

      - name: Verify staging deployment
        run: |
          sleep 15
          STAGING_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          for i in 1 2 3; do
            HEALTH=$(curl -s --max-time 30 "https://$STAGING_URL/api/health" | jq -r '.status' 2>/dev/null || echo 'failed')
            if [ "$HEALTH" = "healthy" ]; then break; fi
            echo "Staging health check attempt $i: $HEALTH — retrying..."
            sleep 10
          done
          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::Staging deployment health check failed"
            exit 1
          fi
          echo "Staging deployment verified: healthy"

  # ============================================
  # BACKEND DEPLOY (Docker Build + Container Apps)
  # ============================================
  deploy-backend:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main'
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      CONTAINER_APP_ENV: ${{ secrets.CONTAINER_APP_ENV }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Trivy Container Security Scan (#45)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Provision metrics storage
        run: |
          STORAGE_NAME="archmorphmetrics"
          # Create storage account (idempotent — no-op if it already exists)
          echo "Creating storage account $STORAGE_NAME..."
          az storage account create \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --location westeurope \
            --sku Standard_LRS \
            --min-tls-version TLS1_2 \
            --https-only true \
            --allow-blob-public-access false \
            --only-show-errors
          # Get connection string
          STORAGE_CONN=$(az storage account show-connection-string \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query connectionString -o tsv)
          echo "STORAGE_CONN=$STORAGE_CONN" >> "$GITHUB_ENV"
          # Create metrics blob container (idempotent)
          az storage container create \
            --name metrics \
            --account-name "$STORAGE_NAME" \
            --connection-string "$STORAGE_CONN" \
            --only-show-errors || true

      # ── Blue-Green Deployment (#38) ──
      - name: Enable multiple revisions
        run: |
          az containerapp revision set-mode \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --mode multiple

      - name: Deploy green revision
        id: green
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              admin-key="${{ env.ADMIN_KEY }}" \
              storage-connection="${{ env.STORAGE_CONN }}" \
            2>/dev/null || true

          # Create new revision (green) with 0% traffic
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }} \
            --set-env-vars \
              ARCHMORPH_ADMIN_KEY=secretref:admin-key \
              AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
            --revision-suffix "sha-${SHORT_SHA}" \
            --no-wait

          # Wait for green revision to be ready
          echo "Waiting for green revision to provision..."
          sleep 45

          GREEN_REV=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, 'sha-${SHORT_SHA}')].name" -o tsv | head -1)

          echo "green_revision=$GREEN_REV" >> $GITHUB_OUTPUT
          echo "Green revision: $GREEN_REV"

      - name: Smoke test green revision
        run: |
          # Get the green revision FQDN
          GREEN_FQDN=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "${{ steps.green.outputs.green_revision }}" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")

          # If revision FQDN not available, use main app URL
          if [ -z "$GREEN_FQDN" ]; then
            TEST_URL="${{ env.API_URL }}"
          else
            TEST_URL="https://$GREEN_FQDN"
          fi

          echo "Running smoke tests against: $TEST_URL"

          # Health check (with retry — container may still be starting)
          for i in 1 2 3; do
            HEALTH=$(curl -s --max-time 30 "$TEST_URL/api/health" | jq -r '.status' 2>/dev/null || echo 'failed')
            if [ "$HEALTH" = "healthy" ]; then break; fi
            echo "Health check attempt $i returned: $HEALTH — retrying in 15s..."
            sleep 15
          done
          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::Green revision health check failed: $HEALTH"
            exit 1
          fi

          # Version check
          VERSION=$(curl -s --max-time 30 "$TEST_URL/api/health" | jq -r '.version' 2>/dev/null || echo 'unknown')
          echo "Green revision version: $VERSION"

          echo "All smoke tests passed on green revision"

      - name: Shift traffic to green (100%)
        run: |
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision-weight "${{ steps.green.outputs.green_revision }}=100"
          echo "100% traffic shifted to green revision: ${{ steps.green.outputs.green_revision }}"

      - name: Deactivate old revisions (keep blue for rollback)
        run: |
          # List all active revisions except the new green one
          OLD_REVS=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active && name != '${{ steps.green.outputs.green_revision }}'].name" -o tsv)

          # Keep only the most recent old revision (blue) active for rollback
          KEEP_BLUE=$(echo "$OLD_REVS" | head -1)
          DEACTIVATE=$(echo "$OLD_REVS" | tail -n +2)

          if [ -n "$KEEP_BLUE" ]; then
            echo "Keeping blue revision for rollback: $KEEP_BLUE"
          fi

          for rev in $DEACTIVATE; do
            echo "Deactivating old revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$rev" || true
          done

      - name: Verify production deployment
        run: |
          sleep 10
          HEALTH=$(curl -s --max-time 30 ${{ env.API_URL }}/health | jq -r '.status')
          if [ "$HEALTH" != "healthy" ]; then
            echo "::error::Production health check failed after traffic shift: $HEALTH"
            exit 1
          fi
          VERSION=$(curl -s --max-time 30 ${{ env.API_URL }}/health | jq -r '.version')
          echo "Deployed version: $VERSION (blue-green complete)"

  # ============================================
  # FRONTEND DEPLOY (Azure Static Web Apps)
  # ============================================
  deploy-frontend:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true
