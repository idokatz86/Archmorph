name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC for Azure deploy; no security-events needed (security.yml handles SARIF)
permissions:
  id-token: write
  security-events: write
  contents: read

env:
  API_URL: ${{ secrets.API_URL }}
  FRONTEND_URL: ${{ secrets.FRONTEND_URL }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  azure-skills-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check azure-skills upstream pin and collisions
        run: python scripts/check_azure_skills_upstream.py --check-telemetry-env
        env:
          AZURE_MCP_COLLECT_TELEMETRY: "false"

  mappings-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Lint mapping freshness
        run: python scripts/lint_mappings_freshness.py

  container-image-pins:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Guard Docker base image pins
        run: python3 scripts/lint_docker_base_images.py

  # ============================================
  # BACKEND TESTS (3.12 only — production version)
  # ============================================
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies and lint
        run: |
          uv pip install --system ruff
          uv pip install --system -r requirements.txt
          ruff check .
          python ../scripts/lint_pytest_no_reruns.py
          python scripts/lint_fastapi_query_body_tests.py

      - name: Run tests with coverage
        run: |
          python -m pytest --tb=short -q -n auto --dist loadfile \
            --cov=. --cov-report=term-missing --cov-config=.coveragerc \
            --cov-context=test --cov-fail-under=63
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Export OpenAPI schema
        run: python export_openapi.py > openapi.json

      - name: Check OpenAPI contract snapshot
        run: python check_openapi_contract.py openapi.json

      - name: Upload OpenAPI schema
        uses: actions/upload-artifact@v7
        with:
          name: openapi-schema
          path: backend/openapi.json
          retention-days: 30

      - name: Generate Backend SBOM
        run: |
          uv pip install --system cyclonedx-bom
          cyclonedx-py requirements -i requirements.txt -o ${{ github.workspace }}/backend-sbom.json

      - name: Grype scan (Python)
        id: grype-python
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ github.workspace }}/backend-sbom.json
          output-format: sarif
          fail-build: "false"

      - name: Upload Python Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: backend-sbom
          path: |
            backend-sbom.json
            ${{ steps.grype-python.outputs.sarif }}

  # ============================================
  # ALEMBIC MIGRATION SMOKE
  # ============================================
  alembic-migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: archmorph
          POSTGRES_PASSWORD: archmorph_dev
          POSTGRES_DB: archmorph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archmorph -d archmorph"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://archmorph:archmorph_dev@127.0.0.1:5432/archmorph
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install backend dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run Alembic migration cycle
        run: |
          python -m alembic heads
          python -m alembic upgrade head --sql > /tmp/archmorph-alembic-upgrade.sql
          test -s /tmp/archmorph-alembic-upgrade.sql
          python -m alembic upgrade head
          python -m alembic downgrade base
          python -m alembic upgrade head

  # ============================================
  # GENERATED IAC VALIDATION
  # ============================================
  iac-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Install Bicep CLI
        run: az bicep install

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p "$RUNNER_TEMP/terraform-plugin-cache"
          echo "TF_PLUGIN_CACHE_DIR=$RUNNER_TEMP/terraform-plugin-cache" >> "$GITHUB_ENV"

      - name: Install backend dependencies
        run: uv pip install --system -r requirements.txt

      - name: Validate generated Terraform and Bicep artifacts
        run: python -m pytest -q tests/test_iac_output_validation.py
        env:
          ARCHMORPH_RUN_IAC_VALIDATE_TOOLS: "1"
          ARCHMORPH_ENABLE_TERRAFORM_CLI_VALIDATION: "1"

  # ============================================
  # CHECKED-IN TERRAFORM VALIDATION
  # ============================================
  terraform-config-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p "$RUNNER_TEMP/terraform-plugin-cache"
          echo "TF_PLUGIN_CACHE_DIR=$RUNNER_TEMP/terraform-plugin-cache" >> "$GITHUB_ENV"

      - name: Check Terraform formatting
        run: find . -path './.terraform' -prune -o -name '*.tf' -print0 | xargs -0 terraform fmt -check

      - name: Validate checked-in Terraform roots without remote backends
        run: |
          for dir in . staging dr observability; do
            echo "::group::terraform validate infra/$dir"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate -no-color
            echo "::endgroup::"
          done

  # ============================================
  # TERRAFORM POLICY-AS-CODE
  # ============================================
  terraform-policy-as-code:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          python -m pip install checkov

      - name: Run Archmorph Terraform policy checks
        run: |
          checkov \
            --quiet \
            --framework terraform \
            --directory infra \
            --external-checks-dir infra/policies/checkov \
            --check CKV_ARCHMORPH_1,CKV_ARCHMORPH_2,CKV_ARCHMORPH_3

  # ============================================
  # CLI FULL-SPINE ARTIFACT CONTRACT
  # ============================================
  cli-full-spine-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install CLI test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -e cli pytest

      - name: Run CLI full-spine artifact contract tests
        run: python -m pytest -q cli/tests/test_archmorph_cli_run.py cli/tests/test_archmorph_cli_http_smoke.py

      - name: Run container-backed CLI full-spine smoke
        run: bash scripts/cli_full_spine_container_smoke.sh
        env:
          DOCKER_BUILDKIT: "1"

  # ============================================
  # FRONTEND BUILD & TEST (npm audit in security.yml)
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LHCI_PORT: "4173"
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Run frontend linter
        run: npm run lint

      - name: Guard Vite environment exposure
        run: python3 ../scripts/lint_vite_env_guard.py

      - name: Run frontend tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

      - name: Bundle size budget
        run: python3 ../scripts/perf_budget.py bundle --dist dist --budget perf/bundle-budget.json

      - name: Lighthouse CI budget
        run: |
          python3 -m http.server "$LHCI_PORT" -d dist >/tmp/archmorph-lighthouse.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          SERVER_READY=0
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${LHCI_PORT}/" >/dev/null; then
              SERVER_READY=1
              break
            fi
            sleep 1
          done
          if [ "$SERVER_READY" -ne 1 ]; then
            cat /tmp/archmorph-lighthouse.log
            exit 1
          fi
          npx --yes @lhci/cli@0.15.1 autorun --config=./lighthouserc.json --collect.url="http://127.0.0.1:${LHCI_PORT}/"

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-lighthouse-report
          path: frontend/.lighthouseci
          if-no-files-found: ignore

      - name: Generate npm SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file ${{ github.workspace }}/frontend-sbom.json --output-format JSON --spec-version 1.5

      - name: Grype scan (npm)
        id: grype-npm
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ github.workspace }}/frontend-sbom.json
          output-format: sarif
          fail-build: "false"

      - name: Upload npm Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-sbom
          path: |
            frontend-sbom.json
            ${{ steps.grype-npm.outputs.sarif }}

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ============================================
  # GENERATED OPENAPI CLIENT DRIFT
  # ============================================
  openapi-client-drift:
    needs: backend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Download backend OpenAPI schema
        uses: actions/download-artifact@v8
        with:
          name: openapi-schema
          path: .

      - name: Normalize downloaded OpenAPI schema location
        run: |
          if [ -f openapi.json ]; then
            mv openapi.json backend/openapi.json
          fi
          test -f backend/openapi.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-fund --no-audit

      - name: Check generated OpenAPI client artifacts
        working-directory: frontend
        run: npm run check:api-drift

      - name: Upload generated OpenAPI client artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openapi-client-artifacts
          path: |
            frontend/src/generated/api-types.d.ts
            frontend/src/generated/api-paths.js
          retention-days: 30

  # ============================================
  # SARIF UPLOAD (isolated so rate-limits don't block builds)
  # ============================================
  upload-sarif:
    needs: [backend-tests, frontend-build, openapi-client-drift, iac-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always() && (needs.backend-tests.result == 'success' || needs.frontend-build.result == 'success')
    continue-on-error: true
    steps:
      - name: Download backend SARIF
        uses: actions/download-artifact@v8
        with:
          name: backend-sbom
          path: backend-sarif
        continue-on-error: true

      - name: Download frontend SARIF
        uses: actions/download-artifact@v8
        with:
          name: frontend-sbom
          path: frontend-sarif
        continue-on-error: true

      - name: Upload Python Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('backend-sarif/**/*.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: backend-sarif
          category: grype-python

      - name: Upload npm Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: hashFiles('frontend-sarif/**/*.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: frontend-sarif
          category: grype-npm

  # ============================================
  # BACKEND DEPLOY (Blue-Green)
  # ============================================
  deploy-backend:
    needs: [backend-tests, frontend-build, openapi-client-drift, iac-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.ref == 'refs/heads/main'
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      CONTAINER_APP_ENV: ${{ secrets.CONTAINER_APP_ENV }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate backend deploy secret inputs
        run: |
          missing=0
          for name in \
            AZURE_SUBSCRIPTION_ID \
            AZURE_TENANT_ID \
            AZURE_CLIENT_ID \
            AZURE_RESOURCE_GROUP \
            ACR_NAME \
            ACR_LOGIN_SERVER \
            CONTAINER_APP_NAME \
            ADMIN_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Required backend deploy input ${name} is not set"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push to ACR
        id: build_backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Capture immutable image reference
        run: |
          if [ -z "${{ steps.build_backend.outputs.digest }}" ]; then
            echo "::error::docker/build-push-action did not return an image digest"
            exit 1
          fi
          IMAGE_REF="${{ env.ACR_LOGIN_SERVER }}/archmorph-api@${{ steps.build_backend.outputs.digest }}"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"
          echo "Using immutable image reference: $IMAGE_REF"

      - name: Trivy container security gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_REF }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: library
          scanners: vuln  # Skip secret/misconfig scanning, focus on dependency CVEs

      - name: Provision metrics storage
        run: |
          # #608: This workflow-owned storage account is intentionally kept here until
          # it is imported into Terraform state or replaced by azurerm_storage_account.main
          # through a separate no-break state plan. Do not change region/SKU inline.
          STORAGE_NAME="archmorphmetrics"
          STORAGE_ACCOUNT_URL="https://${STORAGE_NAME}.blob.core.windows.net"
          echo "STORAGE_NAME=$STORAGE_NAME" >> "$GITHUB_ENV"
          echo "STORAGE_ACCOUNT_URL=$STORAGE_ACCOUNT_URL" >> "$GITHUB_ENV"
          if ! az storage account show --name "$STORAGE_NAME" --resource-group ${{ env.AZURE_RESOURCE_GROUP }} &>/dev/null; then
            echo "Creating storage account..."
            az storage account create \
              --name "$STORAGE_NAME" \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --location westeurope \
              --sku Standard_LRS \
              --min-tls-version TLS1_2 \
              --https-only true \
              --allow-blob-public-access false \
              --allow-shared-key-access false \
              --only-show-errors
          else
            echo "Storage account $STORAGE_NAME already exists, skipping creation."
          fi

          ALLOW_SHARED_KEY=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query allowSharedKeyAccess -o tsv | tr '[:upper:]' '[:lower:]')
          if [ "$ALLOW_SHARED_KEY" != "false" ]; then
            echo "::error::Storage account $STORAGE_NAME must have shared-key access disabled"
            exit 1
          fi

          PUBLIC_NETWORK_ACCESS=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query publicNetworkAccess -o tsv)
          if [ "$PUBLIC_NETWORK_ACCESS" = "Disabled" ]; then
            echo "Storage account $STORAGE_NAME has public network access disabled; enabling it for Container App managed-identity blob access."
            az storage account update \
              --name "$STORAGE_NAME" \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --public-network-access Enabled \
              --only-show-errors >/dev/null
          fi

          PUBLIC_NETWORK_ACCESS=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query publicNetworkAccess -o tsv)
          if [ "$PUBLIC_NETWORK_ACCESS" != "Enabled" ]; then
            echo "::error::Storage account $STORAGE_NAME must allow public network access unless a private endpoint/VNet path is configured for the Container App"
            exit 1
          fi

          STORAGE_CONN=$(az storage account show-connection-string \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query connectionString -o tsv)
          echo "STORAGE_CONN=$STORAGE_CONN" >> "$GITHUB_ENV"
          az storage container create \
            --name metrics \
            --account-name "$STORAGE_NAME" \
            --auth-mode login \
            --only-show-errors || true

          STORAGE_ID=$(az storage account show \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query id -o tsv)
          if [ -z "$STORAGE_ID" ]; then
            echo "::error::Unable to resolve storage account resource ID for $STORAGE_NAME"
            exit 1
          fi
          echo "STORAGE_ID=$STORAGE_ID" >> "$GITHUB_ENV"

          az containerapp identity assign \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --system-assigned \
            --only-show-errors
          CONTAINER_APP_PRINCIPAL_ID=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query identity.principalId -o tsv)
          if [ -z "$CONTAINER_APP_PRINCIPAL_ID" ]; then
            echo "::error::Container App system-assigned identity is not available"
            exit 1
          fi
          echo "CONTAINER_APP_PRINCIPAL_ID=$CONTAINER_APP_PRINCIPAL_ID" >> "$GITHUB_ENV"

          EXISTING_ASSIGNMENT=$(az role assignment list \
            --assignee "$CONTAINER_APP_PRINCIPAL_ID" \
            --role "Storage Blob Data Contributor" \
            --scope "$STORAGE_ID" \
            --query "[0].id" -o tsv)
          if [ -z "$EXISTING_ASSIGNMENT" ]; then
            az role assignment create \
              --assignee-object-id "$CONTAINER_APP_PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Contributor" \
              --scope "$STORAGE_ID" \
              --only-show-errors
          fi

          for attempt in 1 2 3 4 5 6; do
            ASSIGNMENT_ID=$(az role assignment list \
              --assignee "$CONTAINER_APP_PRINCIPAL_ID" \
              --role "Storage Blob Data Contributor" \
              --scope "$STORAGE_ID" \
              --query "[0].id" -o tsv)
            if [ -n "$ASSIGNMENT_ID" ]; then
              echo "Container App identity has Storage Blob Data Contributor on $STORAGE_NAME"
              echo "STORAGE_ROLE_ASSIGNMENT_ID=$ASSIGNMENT_ID" >> "$GITHUB_ENV"
              break
            fi
            if [ "$attempt" -eq 6 ]; then
              echo "::error::Storage Blob Data Contributor assignment did not become visible"
              exit 1
            fi
            sleep 10
          done

      - name: Enable multiple revisions
        run: |
          az containerapp revision set-mode \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --mode multiple

      - name: Deploy green revision
        id: green
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              admin-key="${{ env.ADMIN_KEY }}" \
              storage-connection="${{ env.STORAGE_CONN }}" \
            2>/dev/null || true

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          REVISION_SUFFIX="sha-${SHORT_SHA}-run-${{ github.run_attempt }}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${IMAGE_REF}" \
            --set-env-vars \
              ARCHMORPH_ADMIN_KEY=secretref:admin-key \
              ARCHMORPH_API_KEY=secretref:admin-key \
              AZURE_STORAGE_ACCOUNT_URL="$STORAGE_ACCOUNT_URL" \
              AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection \
              AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              AZURE_OPENAI_DEPLOYMENT="gpt-4.1" \
              AZURE_OPENAI_FALLBACK_DEPLOYMENT="gpt-4o" \
              AZURE_OPENAI_API_VERSION="2025-04-01-preview" \
              ACS_CONNECTION_STRING="${{ secrets.ACS_CONNECTION_STRING }}" \
              ACS_SENDER_EMAIL="${{ secrets.ACS_SENDER_EMAIL }}" \
            --revision-suffix "$REVISION_SUFFIX" \
            --no-wait

          echo "Waiting for green revision to provision..."
          sleep 45

          GREEN_REV=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?contains(name, '$REVISION_SUFFIX')].name" -o tsv | head -1)

          echo "green_revision=$GREEN_REV" >> $GITHUB_OUTPUT
          echo "Green revision: $GREEN_REV"

      - name: Preflight green revision auth and storage contract
        run: |
          GREEN_REV="${{ steps.green.outputs.green_revision }}"
          if [ -z "$GREEN_REV" ]; then
            echo "::error::Green revision name was not produced by deploy step"
            exit 1
          fi

          ENV_JSON=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "$GREEN_REV" \
            --query "properties.template.containers[0].env" -o json)

          for name in ARCHMORPH_ADMIN_KEY ARCHMORPH_API_KEY AZURE_STORAGE_ACCOUNT_URL; do
            if ! echo "$ENV_JSON" | jq -e --arg name "$name" 'any(.[]; .name == $name)' >/dev/null; then
              echo "::error::Green revision is missing required env var ${name}"
              exit 1
            fi
          done

          for name in ARCHMORPH_ADMIN_KEY ARCHMORPH_API_KEY; do
            SECRET_REF=$(echo "$ENV_JSON" | jq -r --arg name "$name" '.[] | select(.name == $name) | .secretRef // ""')
            if [ "$SECRET_REF" != "admin-key" ]; then
              echo "::error::${name} must reference admin-key secret"
              exit 1
            fi
          done

          STORAGE_URL_VALUE=$(echo "$ENV_JSON" | jq -r '.[] | select(.name == "AZURE_STORAGE_ACCOUNT_URL") | .value // ""')
          if [ "$STORAGE_URL_VALUE" != "$STORAGE_ACCOUNT_URL" ]; then
            echo "::error::AZURE_STORAGE_ACCOUNT_URL mismatch. Expected $STORAGE_ACCOUNT_URL, got $STORAGE_URL_VALUE"
            exit 1
          fi

          if [ -z "${CONTAINER_APP_PRINCIPAL_ID:-}" ] || [ -z "${STORAGE_ROLE_ASSIGNMENT_ID:-}" ]; then
            echo "::error::Container App identity or blob role assignment proof is missing"
            exit 1
          fi

      - name: Smoke test green revision
        run: |
          GREEN_FQDN=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision "${{ steps.green.outputs.green_revision }}" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")

          TEST_URL="${GREEN_FQDN:+https://$GREEN_FQDN}"
          # API_URL includes /api suffix; for raw FQDNs we need /api/health,
          # for API_URL fallback we need /health
          if [ -n "$GREEN_FQDN" ]; then
            HEALTH_PATH="/api/health"
          else
            TEST_URL="${{ env.API_URL }}"
            HEALTH_PATH="/health"
          fi

          curl_health() {
            local url="$1"
            if [ -n "${ADMIN_KEY:-}" ]; then
              curl -sS --max-time 30 -H "X-API-Key: $ADMIN_KEY" "$url"
            else
              curl -sS --max-time 30 "$url"
            fi
          }

          echo "Running smoke tests against: $TEST_URL$HEALTH_PATH"
          BODY=$(curl_health "$TEST_URL$HEALTH_PATH" || true)
          CATALOG_STALE=$(echo "$BODY" | jq -r '.service_catalog_refresh.stale // false' 2>/dev/null || echo false)
          echo "Initial green revision service_catalog_refresh.stale=$CATALOG_STALE"

          if [ -n "$GREEN_FQDN" ]; then
            STORAGE_PREFLIGHT_URL="$TEST_URL/api/service-updates/storage-preflight"
            REFRESH_URL="$TEST_URL/api/service-updates/run-now"
          else
            STORAGE_PREFLIGHT_URL="$TEST_URL/service-updates/storage-preflight"
            REFRESH_URL="$TEST_URL/service-updates/run-now"
          fi

          echo "Validating green revision managed-identity blob read/write/list path: $STORAGE_PREFLIGHT_URL"
          for attempt in 1 2 3 4 5 6; do
            if ! HTTP_CODE=$(curl -sS -o storage-preflight-response.json -w "%{http_code}" \
              --max-time 60 \
              -X POST "$STORAGE_PREFLIGHT_URL" \
              -H "X-API-Key: $ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d '{}'); then
              HTTP_CODE="${HTTP_CODE:-000}"
            fi

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Green revision managed-identity blob preflight OK on attempt ${attempt}"
              break
            fi

            echo "::warning::Green revision managed-identity blob preflight attempt ${attempt} returned HTTP ${HTTP_CODE}"
            if [ -s storage-preflight-response.json ]; then
              jq -c '{detail: (.detail // .)}' storage-preflight-response.json 2>/dev/null \
                || head -c 2000 storage-preflight-response.json
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep $((attempt * 15))
            else
              echo "::error::Green revision managed-identity blob preflight failed after 6 attempts"
              exit 1
            fi
          done

          echo "Validating green revision refresh auth and managed-identity blob path: $REFRESH_URL"
          for attempt in 1 2; do
            if ! HTTP_CODE=$(curl -sS -o refresh-response.json -w "%{http_code}" \
              --max-time 300 \
              -X POST "$REFRESH_URL" \
              -H "X-API-Key: $ADMIN_KEY" \
              -H "Content-Type: application/json" \
              -d '{}'); then
              HTTP_CODE="${HTTP_CODE:-000}"
            fi

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Green revision service catalog refresh OK on attempt ${attempt}"
              break
            fi

            echo "::warning::Green revision refresh attempt ${attempt} returned HTTP ${HTTP_CODE}"
            if [ -s refresh-response.json ]; then
              jq -c '{status: (.status // .detail // "unknown"), errors: (.errors // {})}' refresh-response.json 2>/dev/null \
                || head -c 2000 refresh-response.json
            fi
            if [ "$attempt" -lt 2 ]; then
              sleep $((attempt * 15))
            else
              echo "::error::Green revision service catalog refresh failed after 2 attempts"
              exit 1
            fi
          done

          HEALTH_RETRIES=3 HEALTH_RETRY_SECONDS=15 HEALTH_API_KEY="$ADMIN_KEY" ./scripts/health_gate.sh "$TEST_URL$HEALTH_PATH"
          VERSION=$(curl_health "$TEST_URL$HEALTH_PATH" | jq -r '.version' 2>/dev/null || echo 'unknown')
          echo "Green revision version: $VERSION — all smoke tests passed"

      - name: Shift traffic to green (100%)
        run: |
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --revision-weight "${{ steps.green.outputs.green_revision }}=100"

      - name: Deactivate old revisions (keep blue for rollback)
        run: |
          OLD_REVS=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active && name != '${{ steps.green.outputs.green_revision }}'].name" -o tsv)

          KEEP_BLUE=$(echo "$OLD_REVS" | head -1)
          DEACTIVATE=$(echo "$OLD_REVS" | tail -n +2)

          [ -n "$KEEP_BLUE" ] && echo "Keeping blue revision for rollback: $KEEP_BLUE"

          for rev in $DEACTIVATE; do
            echo "Deactivating old revision: $rev"
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$rev" || true
          done

      - name: Verify production deployment
        run: |
          sleep 10
          HEALTH_RETRIES=3 HEALTH_RETRY_SECONDS=10 HEALTH_API_KEY="$ADMIN_KEY" ./scripts/health_gate.sh "${{ env.API_URL }}/health"
          HEALTH_BODY=$(curl -s --max-time 30 -H "X-API-Key: $ADMIN_KEY" "${{ env.API_URL }}/health")
          HEALTH=$(printf '%s' "$HEALTH_BODY" | jq -r '.status')
          VERSION=$(printf '%s' "$HEALTH_BODY" | jq -r '.version')
          echo "Deployed version: $VERSION — status: $HEALTH (blue-green complete)"

  # ============================================
  # FRONTEND DEPLOY (Azure Static Web Apps)
  # ============================================
  deploy-frontend:
    needs: [backend-tests, frontend-build, openapi-client-drift, iac-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true

  # ============================================
  # POST-DEPLOY SMOKE
  # ============================================
  post-deploy-smoke:
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Run deployed app smoke checks
        run: bash scripts/deployment_smoke.sh
        env:
          API_URL: ${{ env.API_URL }}
          FRONTEND_URL: ${{ env.FRONTEND_URL }}
          HEALTH_API_KEY: ${{ secrets.ADMIN_KEY }}
