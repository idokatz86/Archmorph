name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# OIDC permissions for Azure login
permissions:
  id-token: write
  contents: read

# Fixed configuration - Subscription ID: 00000000-0000-0000-0000-000000000000
env:
  AZURE_SUBSCRIPTION_ID: 00000000-0000-0000-0000-000000000000
  AZURE_TENANT_ID: 00000000-0000-0000-0000-000000000000
  AZURE_CLIENT_ID: 00000000-0000-0000-0000-000000000000
  AZURE_RESOURCE_GROUP: archmorph-rg-dev
  ACR_NAME: archmorphacm7pd
  ACR_LOGIN_SERVER: archmorphacm7pd.azurecr.io
  CONTAINER_APP_NAME: archmorph-api
  SWA_NAME: archmorph-frontend
  API_URL: https://archmorph-api.icyisland-c0dee6ba.northeurope.azurecontainerapps.io/api

jobs:
  # ============================================
  # BACKEND LINT & SECURITY
  # ============================================
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: pip install ruff bandit pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: Bandit security scan
        run: bandit -r . -x ./tests --skip B101

      - name: pip-audit
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln GHSA-wj6h-64fc-37mp
        # Note: GHSA-wj6h-64fc-37mp (ecdsa timing attack) has no fix available yet

  # ============================================
  # BACKEND TESTS
  # ============================================
  backend-tests:
    needs: backend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --tb=short -q
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

  # ============================================
  # FRONTEND BUILD & TEST
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=critical || true  # Don't fail on audit warnings

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

  # ============================================
  # BACKEND DEPLOY (Docker Build + Container Apps)
  # ============================================
  deploy-backend:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}

      - name: Verify deployment
        run: |
          sleep 30
          HEALTH=$(curl -s ${{ env.API_URL }}/health | jq -r '.status')
          if [ "$HEALTH" != "healthy" ]; then
            echo "Health check failed: $HEALTH"
            exit 1
          fi
          VERSION=$(curl -s ${{ env.API_URL }}/health | jq -r '.version')
          echo "✅ Deployed version: $VERSION"

  # ============================================
  # FRONTEND DEPLOY (Azure Static Web Apps)
  # ============================================
  deploy-frontend:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          skip_app_build: true
