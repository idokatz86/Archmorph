name: CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

# OIDC permissions for Azure login
permissions:
  id-token: write
  contents: read
  security-events: write

# All sensitive values come from GitHub Secrets - no hardcoded credentials
# NOTE: Deployment secrets are scoped to deployment jobs only (least privilege)
env:
  API_URL: ${{ secrets.API_URL }}

jobs:
  # ============================================
  # BACKEND LINT & SECURITY (Parallel)
  # ============================================
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: pip install ruff bandit pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: Bandit security scan
        run: |
          # B101 (assert_used) is skipped globally since tests use assertions
          # All other findings use inline # nosec comments for precise documentation
          bandit -r . -x ./tests,./.venv --skip B101

      - name: pip-audit
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln GHSA-wj6h-64fc-37mp
        # Note: GHSA-wj6h-64fc-37mp (ecdsa timing attack) has no fix available yet

  # ============================================
  # SAST - Semgrep Security Analysis (#45)
  # ============================================
  sast-semgrep:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/python
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ============================================
  # SECRET DETECTION - Gitleaks (#45)
  # ============================================
  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # SBOM Generation - CycloneDX (#42)
  # ============================================
  sbom:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Python SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o ../sbom-python.json --format json

      - name: Generate npm SBOM
        working-directory: frontend
        run: |
          npm ci
          npx @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-python.json
            sbom-frontend.json
          retention-days: 90

  # ============================================
  # BACKEND TESTS (Parallel with pytest-xdist) (#36)
  # ============================================
  backend-tests:
    needs: backend-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --tb=short -q
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}

  # ============================================
  # FRONTEND BUILD & TEST
  # ============================================
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

  # ============================================
  # BACKEND DEPLOY (Docker Build + Container Apps)
  # ============================================
  deploy-backend:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      CONTAINER_APP_ENV: ${{ secrets.CONTAINER_APP_ENV }}
      ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Container Security Scan (#45)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Provision metrics storage
        run: |
          STORAGE_NAME="archmorphmetrics"
          # Create storage account (idempotent — no-op if it already exists)
          echo "Creating storage account $STORAGE_NAME..."
          az storage account create \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --location westeurope \
            --sku Standard_LRS \
            --min-tls-version TLS1_2 \
            --https-only true \
            --allow-blob-public-access false \
            --only-show-errors
          # Get connection string
          STORAGE_CONN=$(az storage account show-connection-string \
            --name "$STORAGE_NAME" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query connectionString -o tsv)
          echo "STORAGE_CONN=$STORAGE_CONN" >> "$GITHUB_ENV"
          # Create metrics blob container (idempotent)
          az storage container create \
            --name metrics \
            --account-name "$STORAGE_NAME" \
            --connection-string "$STORAGE_CONN" \
            --only-show-errors || true

      - name: Deploy to Container Apps
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              admin-key="${{ env.ADMIN_KEY }}" \
              storage-connection="${{ env.STORAGE_CONN }}" \
            2>/dev/null || true
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/archmorph-api:${{ github.sha }} \
            --set-env-vars \
              ARCHMORPH_ADMIN_KEY=secretref:admin-key \
              AZURE_STORAGE_CONNECTION_STRING=secretref:storage-connection

      - name: Verify deployment
        run: |
          sleep 30
          HEALTH=$(curl -s ${{ env.API_URL }}/health | jq -r '.status')
          if [ "$HEALTH" != "healthy" ]; then
            echo "Health check failed: $HEALTH"
            exit 1
          fi
          VERSION=$(curl -s ${{ env.API_URL }}/health | jq -r '.version')
          echo "✅ Deployed version: $VERSION"

  # ============================================
  # FRONTEND DEPLOY (Azure Static Web Apps)
  # ============================================
  deploy-frontend:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE: ${{ env.API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          output_location: ''
          skip_app_build: true
