name: Stale Issues & PRs

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has had
            no activity for 60 days. It will be closed in 14 days if no further
            activity occurs. If this issue is still relevant, please leave a
            comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has had no activity for 60 days. It will be closed in 14 days if no
            further activity occurs. If this PR is still relevant, please leave
            a comment or remove the stale label.
          exempt-issue-labels: "high-priority,monitoring-alert,security"
          exempt-pr-labels: "high-priority,security"
