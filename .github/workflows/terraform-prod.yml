name: Terraform Production

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-prod.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to true to apply the reviewed production plan"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_WORKING_DIR: infra
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_db_admin_username: ${{ secrets.DB_ADMIN_USERNAME }}
  TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
  TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}

jobs:
  prod-plan:
    name: prod-plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Terraform Format Check
        if: github.event_name == 'push'
        run: terraform fmt -check -recursive

      - name: Terraform Init (backendless validation, readonly lockfile)
        if: github.event_name == 'push'
        run: terraform init -backend=false -input=false -lockfile=readonly

      - name: Terraform Validate
        if: github.event_name == 'push'
        run: terraform validate -no-color

      - name: "Preflight: production remote state RBAC requirements"
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::notice::Production plan/apply uses Azure Storage remote state."
          echo "::notice::Grant this workflow identity Blob data-plane access (for example: Storage Blob Data Contributor) on the tfstate storage account/container."
          echo "::notice::Ensure any required management-plane access is also granted."

      - name: Azure Login (OIDC)
        if: github.event_name == 'workflow_dispatch'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (readonly lockfile)
        if: github.event_name == 'workflow_dispatch'
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform Plan (production)
        if: github.event_name == 'workflow_dispatch'
        run: terraform plan -input=false -out=tfplan

      - name: Show plan
        if: github.event_name == 'workflow_dispatch'
        run: terraform show -no-color tfplan | tee tfplan.txt

      - name: Upload redacted plan artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: prod-tfplan
          path: infra/tfplan.txt
          retention-days: 14

  prod-apply:
    name: prod-apply
    runs-on: ubuntu-latest
    needs: [prod-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (readonly lockfile)
        run: terraform init -input=false -lockfile=readonly

      - name: Terraform Plan (post-approval)
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply (post-approval plan)
        run: terraform apply -input=false tfplan
