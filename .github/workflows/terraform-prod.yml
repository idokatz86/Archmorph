name: Terraform Production

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-prod.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to true to apply the reviewed production plan"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_WORKING_DIR: infra
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_db_admin_username: ${{ secrets.DB_ADMIN_USERNAME }}
  TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
  TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}

jobs:
  prod-plan:
    name: prod-plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (production)
        run: terraform plan -input=false -out=tfplan

      - name: Show plan
        run: terraform show -no-color tfplan | tee tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: prod-tfplan
          path: |
            infra/tfplan
            infra/tfplan.txt
          retention-days: 14

  prod-apply:
    name: prod-apply
    runs-on: ubuntu-latest
    needs: [prod-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download reviewed plan artifact
        uses: actions/download-artifact@v8
        with:
          name: prod-tfplan
          path: infra

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply (reviewed plan)
        run: terraform apply -input=false tfplan
