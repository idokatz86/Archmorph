name: Terraform Production

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-prod.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Set to true to apply the reviewed production plan"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_WORKING_DIR: infra
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_environment: prod
  # The public production deployment currently lives in a legacy dev-named Azure stack.
  # Keep resource names aligned with state until a reviewed prod RG migration exists.
  TF_VAR_resource_group_environment: dev
  TF_VAR_enable_production_infra_hardening: false
  TF_VAR_db_admin_username: ${{ secrets.DB_ADMIN_USERNAME }}
  TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
  TF_VAR_frontend_url: ${{ secrets.FRONTEND_URL }}
  TF_VAR_preserve_legacy_openai_key: true
  TF_VAR_openai_api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}

jobs:
  prod-plan:
    name: prod-plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Terraform Format Check
        if: github.event_name == 'push'
        run: terraform fmt -check -recursive

      - name: Terraform Init (backendless validation, readonly lockfile)
        if: github.event_name == 'push'
        run: terraform init -backend=false -input=false -lockfile=readonly

      - name: Terraform Validate
        if: github.event_name == 'push'
        run: terraform validate -no-color

      - name: Azure Login (OIDC)
        if: github.event_name == 'workflow_dispatch'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Diagnose Azure OIDC principal
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -uo pipefail
          SIGNED_IN_APP_ID=$(az account show --query user.name -o tsv 2>/dev/null || true)
          if [ -z "${SIGNED_IN_APP_ID}" ]; then
            echo "::notice::Unable to resolve signed-in Azure service principal app id for diagnostics. Continuing to remote-state preflight."
            exit 0
          fi
          az ad sp show \
            --id "${SIGNED_IN_APP_ID}" \
            --query '{displayName:displayName, objectId:id, servicePrincipalType:servicePrincipalType}' \
            -o json \
            || echo "::notice::Unable to resolve signed-in Azure service principal directory object. Continuing to remote-state preflight."
      - name: "Preflight: verify remote-state Blob data-plane RBAC"
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          echo "::notice::Production plan/apply uses Azure Storage remote state."

          BACKEND_CONFIG_FILE="main.tf"
          if [ ! -f "$BACKEND_CONFIG_FILE" ]; then
            echo "::error::Cannot find $BACKEND_CONFIG_FILE in ${PWD} to resolve Terraform backend settings."
            exit 1
          fi

          STATE_RESOURCE_GROUP=$(sed -nE 's/^[[:space:]]*resource_group_name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$BACKEND_CONFIG_FILE" | head -1)
          STATE_STORAGE_ACCOUNT=$(sed -nE 's/^[[:space:]]*storage_account_name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$BACKEND_CONFIG_FILE" | head -1)
          STATE_CONTAINER=$(sed -nE 's/^[[:space:]]*container_name[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$BACKEND_CONFIG_FILE" | head -1)
          STATE_KEY=$(sed -nE 's/^[[:space:]]*key[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' "$BACKEND_CONFIG_FILE" | head -1)

          for required in STATE_RESOURCE_GROUP STATE_STORAGE_ACCOUNT STATE_CONTAINER STATE_KEY; do
            if [ -z "${!required:-}" ]; then
              echo "::error::Unable to resolve Terraform backend ${required} from ${BACKEND_CONFIG_FILE}."
              exit 1
            fi
          done

          STATE_CONTAINER_SCOPE="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${STATE_RESOURCE_GROUP}/providers/Microsoft.Storage/storageAccounts/${STATE_STORAGE_ACCOUNT}/blobServices/default/containers/${STATE_CONTAINER}"
          STATE_STORAGE_SCOPE="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${STATE_RESOURCE_GROUP}/providers/Microsoft.Storage/storageAccounts/${STATE_STORAGE_ACCOUNT}"

          echo "Terraform remote state scope: account=${STATE_STORAGE_ACCOUNT}, container=${STATE_CONTAINER}, key=${STATE_KEY}"

          TFSTATE_ACCESS_ERROR="$(mktemp)"
          set +e
          az storage blob list \
            --only-show-errors \
            --auth-mode login \
            --account-name "${STATE_STORAGE_ACCOUNT}" \
            --container-name "${STATE_CONTAINER}" \
            --prefix "${STATE_KEY}" \
            --num-results 1 >/dev/null 2>"${TFSTATE_ACCESS_ERROR}"
          TFSTATE_ACCESS_STATUS=$?
          set -e

          if [ "${TFSTATE_ACCESS_STATUS}" -ne 0 ]; then
            echo "::error::Terraform remote-state preflight failed: this workflow identity cannot list blobs in ${STATE_STORAGE_ACCOUNT}/${STATE_CONTAINER}."
            echo "::notice::Grant Blob data-plane access (for example: Storage Blob Data Contributor) to AZURE_CLIENT_ID=${ARM_CLIENT_ID}."
            echo "::notice::Least-privilege scope (container): ${STATE_CONTAINER_SCOPE}"
            echo "::notice::Alternative scope (storage account): ${STATE_STORAGE_SCOPE}"
            echo "::notice::After RBAC propagates, rerun this Terraform Production workflow and then rerun CI/CD."
            sed 's/^/az storage blob list: /' "${TFSTATE_ACCESS_ERROR}" >&2
            rm -f "${TFSTATE_ACCESS_ERROR}"
            exit 1
          fi

          rm -f "${TFSTATE_ACCESS_ERROR}"
          echo "Terraform remote-state Blob data-plane preflight succeeded."

      - name: Terraform Init
        if: github.event_name == 'workflow_dispatch'
        run: terraform init -input=false -lockfile=readonly

      - name: "Preflight: verify Terraform state stack contract"
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          STACK_ENVIRONMENT="${TF_VAR_resource_group_environment:-${TF_VAR_environment}}"
          EXPECTED_RESOURCE_GROUP="archmorph-rg-${STACK_ENVIRONMENT}"

          if [ "$(az group exists --name "${EXPECTED_RESOURCE_GROUP}" -o tsv)" != "true" ]; then
            echo "::error::Expected Terraform target resource group ${EXPECTED_RESOURCE_GROUP} does not exist. Refusing to plan."
            exit 1
          fi

          STATE_SNAPSHOT="$(mktemp)"
          terraform state pull > "${STATE_SNAPSHOT}"
          EXPECTED_RESOURCE_GROUP="${EXPECTED_RESOURCE_GROUP}" STATE_SNAPSHOT="${STATE_SNAPSHOT}" python - <<'PY'
          import json
          import os
          from pathlib import Path

          state = json.loads(Path(os.environ["STATE_SNAPSHOT"]).read_text(encoding="utf-8"))
          expected_resource_group = os.environ["EXPECTED_RESOURCE_GROUP"]

          managed_resources = state.get("resources", [])
          resource_group = next(
              (
                  instance.get("attributes", {}).get("name")
                  for resource in managed_resources
                  if resource.get("type") == "azurerm_resource_group" and resource.get("name") == "main"
                  for instance in resource.get("instances", [])
              ),
              None,
          )

          if resource_group is None:
              raise SystemExit("::error::Terraform state does not contain azurerm_resource_group.main. Refusing to plan.")

          if resource_group != expected_resource_group:
              raise SystemExit(
                  f"::error::Terraform state targets {resource_group}, but workflow stack settings "
                  f"expects {expected_resource_group}. Refusing to plan because this would replace the stack."
              )

          print(f"Terraform state stack preflight succeeded for {resource_group}.")
          PY
          rm -f "${STATE_SNAPSHOT}"

      - name: Terraform Plan (production)
        if: github.event_name == 'workflow_dispatch'
        run: terraform plan -input=false -out=tfplan

      - name: Show plan
        if: github.event_name == 'workflow_dispatch'
        run: terraform show -no-color tfplan | tee tfplan.txt

      - name: "Preflight: block unsafe live-resource creates and review PostgreSQL firewall-rule destroy"
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          terraform show -json tfplan > tfplan.json
          terraform state pull > tfstate.snapshot.json
          STACK_ENVIRONMENT="${TF_VAR_resource_group_environment:-${TF_VAR_environment}}"
          STACK_ENVIRONMENT="${STACK_ENVIRONMENT}" ARM_SUBSCRIPTION_ID="${ARM_SUBSCRIPTION_ID}" python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          def fail(message: str) -> None:
              print(f"::error::{message}")
              sys.exit(1)

          def state_instance_attr(state: dict, resource_type: str, resource_name: str, attr: str) -> str | None:
              for resource in state.get("resources", []):
                  if resource.get("type") != resource_type or resource.get("name") != resource_name:
                      continue
                  for instance in resource.get("instances", []):
                      value = instance.get("attributes", {}).get(attr)
                      if value not in (None, ""):
                          return value
              return None

          def azure_resource_exists(resource_id: str) -> bool:
              result = subprocess.run(
                  [
                      "az",
                      "resource",
                      "show",
                      "--only-show-errors",
                      "--ids",
                      resource_id,
                      "-o",
                      "json",
                  ],
                  capture_output=True,
                  text=True,
              )
              return result.returncode == 0

          state = json.loads(Path("tfstate.snapshot.json").read_text(encoding="utf-8"))
          plan = json.loads(Path("tfplan.json").read_text(encoding="utf-8"))

          stack_environment = os.environ["STACK_ENVIRONMENT"]
          subscription_id = os.environ["ARM_SUBSCRIPTION_ID"]
          resource_group = f"archmorph-rg-{stack_environment}"

          name_suffix = state_instance_attr(state, "random_string", "suffix", "result")
          if not name_suffix:
              fail(
                  "Terraform state is missing random_string.suffix.result, so the workflow cannot derive "
                  "the legacy live resource IDs that must be imported before any reviewed apply."
              )

          live_resources = [
              {
                  "address": "azurerm_container_app_environment.main",
                  "resource_id": (
                      f"/subscriptions/{subscription_id}/resourceGroups/{resource_group}"
                      f"/providers/Microsoft.App/managedEnvironments/archmorph-cae-{stack_environment}"
                  ),
              },
              {
                  "address": "azurerm_container_app.backend",
                  "resource_id": (
                      f"/subscriptions/{subscription_id}/resourceGroups/{resource_group}"
                      "/providers/Microsoft.App/containerApps/archmorph-api"
                  ),
              },
              {
                  "address": "azurerm_user_assigned_identity.container_app",
                  "resource_id": (
                      f"/subscriptions/{subscription_id}/resourceGroups/{resource_group}"
                      "/providers/Microsoft.ManagedIdentity/userAssignedIdentities/archmorph-api-identity"
                  ),
              },
              {
                  "address": "azurerm_storage_account.main",
                  "resource_id": (
                      f"/subscriptions/{subscription_id}/resourceGroups/{resource_group}"
                      f"/providers/Microsoft.Storage/storageAccounts/archmorph{name_suffix}"
                  ),
              },
              {
                  "address": "azurerm_redis_cache.main",
                  "resource_id": (
                      f"/subscriptions/{subscription_id}/resourceGroups/{resource_group}"
                      f"/providers/Microsoft.Cache/Redis/archmorph-redis-{name_suffix}"
                  ),
              },
              {
                  "address": "azurerm_static_web_app.frontend",
                  "resource_id": (
                      f"/subscriptions/{subscription_id}/resourceGroups/{resource_group}"
                      "/providers/Microsoft.Web/staticSites/archmorph-frontend"
                  ),
              },
          ]

          resource_changes = {change.get("address"): change for change in plan.get("resource_changes", [])}
          adoption_gaps: list[dict[str, str]] = []

          for resource in live_resources:
              change = resource_changes.get(resource["address"])
              actions = change.get("change", {}).get("actions", []) if change else []
              if "create" not in actions:
                  continue
              if not azure_resource_exists(resource["resource_id"]):
                  continue

              adoption_gaps.append(
                  {
                      **resource,
                      "import_command": f'terraform import {resource["address"]} \'{resource["resource_id"]}\'',
                  }
              )

          if adoption_gaps:
              print(
                  "::error::Terraform plan still wants to create Azure resources that already exist "
                  "live in the legacy dev-named stack. Import them into Terraform state before approving any apply."
              )
              for resource in adoption_gaps:
                  print(
                      "::notice::"
                      f"{resource['address']} already exists live. Import with: {resource['import_command']}"
                  )
              print(
                  "::notice::After importing the resources above, rerun Terraform Production with apply=false "
                  "and confirm those create actions are gone before reviewing any apply."
              )
              sys.exit(1)

          print("Terraform live-resource adoption preflight found no known existing resources planned as creates.")

          firewall_change = resource_changes.get("azurerm_postgresql_flexible_server_firewall_rule.allow_azure[0]")
          if firewall_change and "delete" in firewall_change.get("change", {}).get("actions", []):
              server_name = state_instance_attr(state, "azurerm_postgresql_flexible_server", "main", "name")
              if not server_name:
                  fail(
                      "Terraform plans to remove azurerm_postgresql_flexible_server_firewall_rule.allow_azure[0], "
                      "but the workflow could not resolve the live PostgreSQL server name from state."
                  )

              network_access = subprocess.run(
                  [
                      "az",
                      "postgres",
                      "flexible-server",
                      "show",
                      "--only-show-errors",
                      "--resource-group",
                      resource_group,
                      "--name",
                      server_name,
                      "--query",
                      "network.publicNetworkAccess",
                      "-o",
                      "tsv",
                  ],
                  capture_output=True,
                  text=True,
              )
              if network_access.returncode != 0:
                  fail(
                      "Terraform plans to remove the legacy AllowAzureServices firewall rule, but Azure CLI "
                      "could not verify the current PostgreSQL publicNetworkAccess setting."
                  )

              public_network_access = network_access.stdout.strip()
              if public_network_access.lower() != "disabled":
                  fail(
                      "Terraform plans to remove the legacy AllowAzureServices firewall rule while "
                      f"publicNetworkAccess is {public_network_access!r}. Review that destroy manually before any apply."
                  )

              print(
                  "Legacy AllowAzureServices firewall rule is planned for removal and PostgreSQL "
                  "publicNetworkAccess is Disabled, so the rule is redundant while public access stays off."
              )
          else:
              print("Terraform plan does not include an AllowAzureServices firewall-rule destroy.")
          PY
          rm -f tfplan.json tfstate.snapshot.json

      - name: Collect plan integrity metadata
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          if [ ! -f .terraform.lock.hcl ]; then
            echo "::error::.terraform.lock.hcl missing after terraform init."
            exit 1
          fi

          terraform state pull > tfstate.snapshot.json
          PLAN_CREATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          PLAN_CREATED_AT="$PLAN_CREATED_AT" python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          def sha256_file(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          plan_sha = sha256_file(Path("tfplan"))
          provider_lock_sha = sha256_file(Path(".terraform.lock.hcl"))
          Path("tfplan.sha256").write_text(plan_sha + "\n", encoding="utf-8")
          Path("provider_lock.sha256").write_text(provider_lock_sha + "\n", encoding="utf-8")

          state = json.loads(Path("tfstate.snapshot.json").read_text(encoding="utf-8"))
          metadata = {
              "artifact_schema_version": 1,
              "plan_commit_sha": os.environ["GITHUB_SHA"],
              "plan_sha256": plan_sha,
              "provider_lock_sha256": provider_lock_sha,
              "state_lineage": state.get("lineage"),
              "state_serial": state.get("serial"),
              "planned_by": os.environ["GITHUB_ACTOR"],
              "planned_at": os.environ["PLAN_CREATED_AT"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          Path("plan-metadata.json").write_text(json.dumps(metadata, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Encrypt reviewed production plan bundle
        if: github.event_name == 'workflow_dispatch'
        env:
          TFPLAN_ARTIFACT_PASSPHRASE: ${{ secrets.TFPLAN_ARTIFACT_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${TFPLAN_ARTIFACT_PASSPHRASE:-}" ]; then
            echo "::error::TFPLAN_ARTIFACT_PASSPHRASE secret is required to encrypt the reviewed Terraform plan artifact."
            exit 1
          fi
          tar -czf prod-reviewed-plan.tar.gz \
            tfplan \
            tfplan.sha256 \
            .terraform.lock.hcl \
            provider_lock.sha256 \
            plan-metadata.json
          openssl enc -aes-256-cbc -pbkdf2 -salt \
            -in prod-reviewed-plan.tar.gz \
            -out prod-reviewed-plan.tar.gz.enc \
            -pass env:TFPLAN_ARTIFACT_PASSPHRASE
          rm -f prod-reviewed-plan.tar.gz

      - name: Upload reviewed production plan artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: prod-reviewed-plan
          path: |
            infra/tfplan.txt
            infra/prod-reviewed-plan.tar.gz.enc
          retention-days: 1

  prod-apply:
    name: prod-apply
    runs-on: ubuntu-latest
    needs: [prod-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - name: Download reviewed production plan artifact
        uses: actions/download-artifact@v8
        with:
          name: prod-reviewed-plan
          path: infra/reviewed-plan

      - name: Decrypt reviewed production plan bundle
        env:
          TFPLAN_ARTIFACT_PASSPHRASE: ${{ secrets.TFPLAN_ARTIFACT_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${TFPLAN_ARTIFACT_PASSPHRASE:-}" ]; then
            echo "::error::TFPLAN_ARTIFACT_PASSPHRASE secret is required to decrypt the reviewed Terraform plan artifact."
            exit 1
          fi
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in reviewed-plan/prod-reviewed-plan.tar.gz.enc \
            -out reviewed-plan/prod-reviewed-plan.tar.gz \
            -pass env:TFPLAN_ARTIFACT_PASSPHRASE
          tar -xzf reviewed-plan/prod-reviewed-plan.tar.gz -C reviewed-plan
          rm -f reviewed-plan/prod-reviewed-plan.tar.gz
          cp reviewed-plan/.terraform.lock.hcl .terraform.lock.hcl

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.x"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false -lockfile=readonly

      - name: Verify reviewed plan artifact integrity and assumptions
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import sys
          from pathlib import Path
          from subprocess import CalledProcessError, run

          def fail(message: str) -> None:
              print(f"::error::{message}")
              sys.exit(1)

          metadata_path = Path("reviewed-plan/plan-metadata.json")
          plan_path = Path("reviewed-plan/tfplan")
          plan_hash_path = Path("reviewed-plan/tfplan.sha256")

          if not metadata_path.exists():
              fail("Missing plan-metadata.json from reviewed plan artifact.")
          if not plan_path.exists():
              fail("Missing binary tfplan from reviewed plan artifact.")
          if not plan_hash_path.exists():
              fail("Missing tfplan.sha256 from reviewed plan artifact.")

          metadata = json.loads(metadata_path.read_text(encoding="utf-8"))

          if metadata.get("plan_commit_sha") != os.environ.get("GITHUB_SHA"):
              fail("Source revision changed since plan approval. Re-run plan and approval.")

          lock_path = Path(".terraform.lock.hcl")
          if not lock_path.exists():
              fail("Current .terraform.lock.hcl missing after terraform init.")
          current_lock_hash = hashlib.sha256(lock_path.read_bytes()).hexdigest()
          if current_lock_hash != metadata.get("provider_lock_sha256"):
              fail("Provider lock data changed since plan approval. Re-run plan and approval.")

          current_plan_hash = hashlib.sha256(plan_path.read_bytes()).hexdigest()
          expected_plan_hash = metadata.get("plan_sha256")
          if current_plan_hash != expected_plan_hash:
              fail("Downloaded plan hash does not match reviewed plan metadata.")

          declared_plan_hash = plan_hash_path.read_text(encoding="utf-8").strip()
          if declared_plan_hash != current_plan_hash:
              fail("Downloaded plan hash file does not match binary plan.")

          try:
              state_pull = run(
                  ["terraform", "state", "pull"],
                  check=True,
                  capture_output=True,
                  text=True,
              )
          except CalledProcessError as exc:
              fail(
                  "Unable to pull remote state for reviewed-plan verification. "
                  f"terraform state pull exited with code {exc.returncode}."
              )

          state = json.loads(state_pull.stdout)
          if state.get("lineage") != metadata.get("state_lineage"):
              fail("Remote state lineage changed since plan approval. Re-run plan and approval.")
          if state.get("serial") != metadata.get("state_serial"):
              fail("Remote state serial changed since plan approval. Re-run plan and approval.")
          PY

      - name: Record approval metadata
        run: |
          set -euo pipefail
          APPROVED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          APPROVED_AT="$APPROVED_AT" python - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path("reviewed-plan/plan-metadata.json").read_text(encoding="utf-8"))
          metadata["approval"] = {
              "workflow_actor": os.environ["GITHUB_ACTOR"],
              "environment": "production",
              "recorded_at": os.environ["APPROVED_AT"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          Path("reviewed-plan/approval-metadata.json").write_text(json.dumps(metadata, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload approval metadata artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prod-reviewed-plan-approval
          path: infra/reviewed-plan/approval-metadata.json
          retention-days: 14

      - name: Terraform Apply (reviewed plan artifact)
        run: terraform apply -input=false reviewed-plan/tfplan
