name: Security Scanning
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  # ────────────────────────────────────────────
  # SAST — CodeQL (existing)
  # ────────────────────────────────────────────
  codeql:
    name: "SAST — CodeQL"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v6
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          
      - name: Perform Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}

  dependency-audit:
    name: "Dependency Audit — pip/npm"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          pip-audit -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  gitleaks:
    name: "Secret Scan — Gitleaks"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────
  # Container Scan — Trivy (#378)
  # Builds image locally, scans for HIGH/CRITICAL
  # CVEs, uploads SARIF to GitHub Security tab
  # ────────────────────────────────────────────
  trivy-container:
    name: "Container Scan — Trivy"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image for scanning
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          load: true
          tags: archmorph-api:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: archmorph-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln

      - name: Trivy vulnerability scan (table — CI log)
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          image-ref: archmorph-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
