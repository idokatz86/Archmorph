# =============================================================================
# SBOM Generation & Vulnerability Scanning — Issue #42
# Generates CycloneDX SBOMs for Python and npm dependencies,
# runs Grype vulnerability scans, and uploads artifacts.
# =============================================================================
name: SBOM Generation

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # For uploading SARIF results

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────
  # Python SBOM (backend)
  # ───────────────────────────────────────────────────────────
  python-sbom:
    name: Python SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Install CycloneDX for Python
        run: pip install cyclonedx-bom

      - name: Generate Python SBOM (CycloneDX)
        run: |
          cyclonedx-py requirements \
            -i requirements.txt \
            -o ../backend-sbom.json
        working-directory: backend

      - name: Upload Python SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sbom
          path: backend-sbom.json
          retention-days: 90

      - name: Run Grype vulnerability scan on Python SBOM
        uses: anchore/scan-action@v6
        id: grype-python
        with:
          sbom: backend-sbom.json
          output-format: sarif
          output-file: python-grype-results.sarif
          fail-build: "false"

      - name: Upload Python Grype SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: python-grype-results.sarif
          category: grype-python

      - name: Upload Python Grype results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-grype-results
          path: python-grype-results.sarif
          retention-days: 90

  # ───────────────────────────────────────────────────────────
  # npm SBOM (frontend)
  # ───────────────────────────────────────────────────────────
  npm-sbom:
    name: npm SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend

      - name: Install CycloneDX npm plugin
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate npm SBOM (CycloneDX)
        run: |
          cyclonedx-npm --output-file ../frontend-sbom.json \
            --output-format JSON \
            --spec-version 1.5
        working-directory: frontend

      - name: Upload npm SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-sbom
          path: frontend-sbom.json
          retention-days: 90

      - name: Run Grype vulnerability scan on npm SBOM
        uses: anchore/scan-action@v6
        id: grype-npm
        with:
          sbom: frontend-sbom.json
          output-format: sarif
          output-file: npm-grype-results.sarif
          fail-build: "false"

      - name: Upload npm Grype SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: npm-grype-results.sarif
          category: grype-npm

      - name: Upload npm Grype results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-grype-results
          path: npm-grype-results.sarif
          retention-days: 90

  # ───────────────────────────────────────────────────────────
  # Attach SBOMs to GitHub Release
  # ───────────────────────────────────────────────────────────
  attach-to-release:
    name: Attach SBOMs to Release
    if: github.event_name == 'release'
    needs: [python-sbom, npm-sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download Python SBOM
        uses: actions/download-artifact@v4
        with:
          name: python-sbom

      - name: Download npm SBOM
        uses: actions/download-artifact@v4
        with:
          name: npm-sbom

      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          name: python-grype-results

      - name: Download npm scan results
        uses: actions/download-artifact@v4
        with:
          name: npm-grype-results

      - name: Upload SBOMs & scan results to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backend-sbom.json
            frontend-sbom.json
            python-grype-results.sarif
            npm-grype-results.sarif
